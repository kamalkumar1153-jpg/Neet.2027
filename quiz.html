<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEET 2027 Prep</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Home Screen Styles */
        .home-menu { text-align: center; padding: 20px; }
        .sub-card { 
            background: white; padding: 20px; margin: 15px 0; 
            border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            cursor: pointer; font-weight: bold; font-size: 1.2rem;
            transition: 0.3s; border-left: 8px solid #ddd;
        }
        .bio-card { border-color: #2ecc71; color: #27ae60; }
        .phy-card { border-color: #3498db; color: #2980b9; }
        .che-card { border-color: #f1c40f; color: #f39c12; }
        .sub-card:active { transform: scale(0.95); }
        
        .quiz-area { display: none; } /* शुरू में छुपा रहेगा */
        #question-box { background: white; padding: 20px; border-radius: 15px; margin: 20px 0; }
        .opt-btn { 
            width: 100%; padding: 15px; margin: 8px 0; border: 1px solid #eee; 
            border-radius: 10px; background: #fdfdfd; cursor: pointer; text-align: left;
        }
    </style>
</head>
<body>

    <div id="home-screen" class="home-menu">
        <h2>🎯 Select Subject</h2>
        <div class="sub-card bio-card" onclick="startQuiz('biology')">🧬 Biology</div>
        <div class="sub-card phy-card" onclick="startQuiz('physics')">⚡ Physics</div>
        <div class="sub-card che-card" onclick="startQuiz('chemistry')">🧪 Chemistry</div>
    </div>

    <div id="quiz-area" class="quiz-area">
        <div style="display: flex; justify-content: space-between; padding: 10px;">
            <button onclick="location.reload()" style="background:none; border:none; color:#777;">⬅️ Back</button>
            <b id="active-sub-title">Subject</b>
        </div>
        
        <div id="question-box">
            <p>Loading...</p>
        </div>

        <button id="next-btn" onclick="nextQuestion()" style="width:100%; padding:15px; background:#333; color:white; border:none; border-radius:10px;">Next Question ➡️</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="firebase.js"></script>
    <script src="quiz.js"></script>

    <script>
        // यह छोटा सा लॉजिक Home और Quiz को स्विच करेगा
        function startQuiz(sub) {
            document.getElementById('home-screen').style.display = 'none';
            document.getElementById('quiz-area').style.display = 'block';
            document.getElementById('active-sub-title').innerText = sub.toUpperCase();
            
            // यह आपके quiz.js वाले फंक्शन को कॉल करेगा
            loadSubjectData(sub); 
        }
    </script>
</body>
</html>
