<link rel="stylesheet" href="style.css">

<div class="container">
  <h2>🛠 Admin Panel</h2>

  <label>Subject</label>
  <select id="subject">
    <option value="bio">Biology</option>
    <option value="chem">Chemistry</option>
    <option value="phy">Physics</option>
    <option value="full">Full Test</option>
  </select>

  <label>Question</label>
  <input id="q" placeholder="Enter Question">

  <label>Options</label>
  <input id="o1" placeholder="Option 1">
  <input id="o2" placeholder="Option 2">
  <input id="o3" placeholder="Option 3">
  <input id="o4" placeholder="Option 4">

  <label>Correct Answer (0-3)</label>
  <input id="ans" placeholder="Answer index">

  <button onclick="add()">➕ Add Question</button>

  <hr>

  <h3>📋 Questions List</h3>
  <div id="list"></div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

<script src="firebase.js"></script>
<script src="admin.js"></script>
