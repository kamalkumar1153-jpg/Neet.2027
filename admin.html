<h2>🛠 Admin Panel (NEET App)</h2>

<select id="subject">
  <option value="bio">Biology</option>
  <option value="chem">Chemistry</option>
  <option value="phy">Physics</option>
  <option value="full">Full Test</option>
</select>

<br><br>

<input id="q" placeholder="Enter Question"><br><br>

<input id="o1" placeholder="Option 1"><br>
<input id="o2" placeholder="Option 2"><br>
<input id="o3" placeholder="Option 3"><br>
<input id="o4" placeholder="Option 4"><br><br>

<input id="ans" placeholder="Correct Answer (0-3)"><br><br>

<button onclick="add()">➕ Add Question</button>

<hr>

<h3>📋 All Questions</h3>
<div id="list"></div>
