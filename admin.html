<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEET Admin Panel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="admin-container">
    <h2>🎯 NEET Admin Panel</h2>
    
    <div class="card add-form">
        <select id="subject">
            <option value="biology">Biology</option>
            <option value="physics">Physics</option>
            <option value="chemistry">Chemistry</option>
        </select>

        <select id="level">
            <option value="Easy">🟢 Easy</option>
            <option value="Medium">🟠 Medium</option>
            <option value="Hard">🔴 Hard</option>
        </select>

        <textarea id="q" placeholder="यहाँ प्रश्न लिखें..."></textarea>
        
        <input type="text" id="imgUrl" placeholder="Image URL (यदि चित्र है तो)">
        
        <div class="options-grid">
            <input type="text" id="o1" placeholder="Option 1">
            <input type="text" id="o2" placeholder="Option 2">
            <input type="text" id="o3" placeholder="Option 3">
            <input type="text" id="o4" placeholder="Option 4">
        </div>

        <input type="number" id="ans" placeholder="सही उत्तर का नंबर (1-4)">
        
        <button class="add-btn" onclick="add()">➕ Add Question</button>
    </div>

    <hr>
    <h3>📜 Question List</h3>
    <div id="list"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="firebase.js"></script> <script src="admin.js"></script>

</body>
</html>
