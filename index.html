<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bitiya Study Vault 2027</title>
    <style>
        :root { --p: #6c5ce7; --s: #00b894; --bg: #f0f3f7; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 15px; display: flex; justify-content: center; }
        .app-card { width: 100%; max-width: 420px; background: white; padding: 25px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h1 { font-size: 22px; text-align: center; color: #2d3436; margin-bottom: 5px; }
        .target-box { background: #fff5f5; color: #d63031; text-align: center; padding: 10px; border-radius: 12px; font-weight: bold; margin: 15px 0; border: 1px solid #fed7d7; }
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .btn { padding: 18px; border-radius: 15px; border: none; background: var(--p); color: white; font-weight: bold; cursor: pointer; font-size: 14px; }
        .btn-full { background: #0984e3; grid-column: span 2; margin-top: 10px; }
        
        /* Quiz Layout */
        #quiz-screen, #result-screen { display: none; }
        .status { display: flex; justify-content: space-between; font-weight: bold; color: var(--p); margin-bottom: 20px; font-size: 14px; }
        .q-text { font-size: 18px; color: #2d3436; line-height: 1.5; margin-bottom: 20px; font-weight: 600; }
        .opt { width: 100%; padding: 15px; margin-bottom: 10px; border: 2px solid #edeff2; border-radius: 12px; background: white; text-align: left; cursor: pointer; font-size: 15px; }
        .opt:active { background: #f3f0ff; border-color: var(--p); }
    </style>
</head>
<body>

<div class="app-card">
    <div id="home-screen">
        <h1>Bitiya Study Vault 🎓</h1>
        <div class="target-box" id="timer">Loading Exam Date...</div>
        <div class="menu-grid">
            <button class="btn" onclick="start('Physics')">⚛️ Physics</button>
            <button class="btn" onclick="start('Chemistry')">🧪 Chemistry</button>
            <button class="btn" onclick="start('Biology')">🧬 Biology</button>
            <button class="btn" onclick="start('All')">📝 Full Practice</button>
        </div>
    </div>

    <div id="quiz-screen">
        <div class="status">
            <span id="sub-name">SUBJECT</span>
            <span id="q-count">1/10</span>
        </div>
        <div class="q-text" id="question">Sawal aa raha hai...</div>
        <div id="options-box"></div>
    </div>

    <div id="result-screen" style="text-align: center;">
        <h2>Shaabash! Taiyari Jari Rakhein 🌟</h2>
        <h1 id="score-text" style="font-size: 40px; color: var(--s);">0/10</h1>
        <button class="btn btn-full" onclick="location.reload()">Home Par Wapas</button>
    </div>
</div>

<script>
// --- 100% ASLI RBSE BOARD QUESTIONS ---
const bank = [
    // PHYSICS
    {s:"Physics", q:"Vidyut dharita ka SI matrak kya hai?", o:["Farad","Volt","Ohm","Tesla"], a:"Farad"},
    {s:"Physics", q:"Lenz ka niyam kis sanrakshan par aadharit hai?", o:["Urja","Aavesh","Samveg","Mass"], a:"Urja"},
    {s:"Physics", q:"Heere ka apvartanank kitna hota hai?", o:["2.42","1.50","1.33","1.00"], a:"2.42"},
    {s:"Physics", q:"Transformer kis par kaam karta hai?", o:["Mutual Induction","Self Induction","Eddy Currents","None"], a:"Mutual Induction"},
    {s:"Physics", q:"P-type semiconductor mein mukhya dhara-vahak?", o:["Holes","Electrons","Protons","Ions"], a:"Holes"},
    {s:"Physics", q:"Gaus ka niyam kiske liye hai?", o:["Band Pristh","Khula Pristh","Dono","None"], a:"Band Pristh"},
    {s:"Physics", q:"Prakash ki chaal nirvat mein?", o:["3x10⁸ m/s","3x10⁶ m/s","2x10⁸ m/s","None"], a:"3x10⁸ m/s"},
    {s:"Physics", q:"Pratirodh ka matrak kya hai?", o:["Ohm","Ampere","Volt","Watt"], a:"Ohm"},
    {s:"Physics", q:"Kirchhoff ka Junction rule kiske liye hai?", o:["Aavesh Sanrakshan","Urja","Samveg","None"], a:"Aavesh Sanrakshan"},
    {s:"Physics", q:"Electronic aavesh (e) ka maan?", o:["1.6x10⁻¹⁹ C","9.1x10⁻³¹ C","6.6x10⁻³⁴ C","None"], a:"1.6x10⁻¹⁹ C"},

    // CHEMISTRY
    {s:"Chemistry", q:"Benzene ka rasayanik sutra?", o:["C6H6","CH4","C2H2","C6H12"], a:"C6H6"},
    {s:"Chemistry", q:"Shuddh jal ka pH maan?", o:["7","1","14","0"], a:"7"},
    {s:"Chemistry", q:"Baking Soda ka formula?", o:["NaHCO3","Na2CO3","NaOH","NaCl"], a:"NaHCO3"},
    {s:"Chemistry", q:"Graphite mein carbon ka hybridization?", o:["sp2","sp3","sp","dsp2"], a:"sp2"},
    {s:"Chemistry", q:"NaCl mein kaunsa bandhan hai?", o:["Ionic","Covalent","Metallic","None"], a:"Ionic"},
    {s:"Chemistry", q:"Vitamin C ka naam?", o:["Ascorbic acid","Retinol","Calciferol","None"], a:"Ascorbic acid"},
    {s:"Chemistry", q:"Sabse kathor padarth?", o:["Heera","Loha","Sona","Kanch"], a:"Heera"},
    {s:"Chemistry", q:"Ozone ka sutra?", o:["O3","O2","O","O4"], a:"O3"},
    {s:"Chemistry", q:"Methane ki jyamiti?", o:["Tetrahedral","Linear","Planar","None"], a:"Tetrahedral"},
    {s:"Chemistry", q:"Sabse prabal oxidizing agent?", o:["F2","Cl2","Br2","I2"], a:"F2"},

    // BIOLOGY
    {s:"Biology", q:"Powerhouse of cell?", o:["Mitochondria","Nucleus","Ribosome","Golgi"], a:"Mitochondria"},
    {s:"Biology", q:"Blood Group O kya hai?", o:["Universal Donor","Acceptor","Both","None"], a:"Universal Donor"},
    {s:"Biology", q:"Insulin kahan banta hai?", o:["Pancreas","Liver","Kidney","Heart"], a:"Pancreas"},
    {s:"Biology", q:"Master gland kise kehte hain?", o:["Pituitary","Thyroid","Adrenal","None"], a:"Pituitary"},
    {s:"Biology", q:"DNA model kisne diya?", o:["Watson-Crick","Mendel","Darwin","None"], a:"Watson-Crick"},
    {s:"Biology", q:"RBC ka life span kitna hai?", o:["120 din","60 din","10 din","None"], a:"120 din"},
    {s:"Biology", q:"Kidney ki unit?", o:["Nephron","Neuron","Cell","Tissue"], a:"Nephron"},
    {s:"Biology", q:"Xylem kya parivahan karta hai?", o:["Jal (Water)","Food","Oxygen","None"], a:"Jal (Water)"},
    {s:"Biology", q:"Manav mein kitne gun-sutra?", o:["46","23","44","48"], a:"46"},
    {s:"Biology", q:"Scurvy kiski kami se hota hai?", o:["Vit C","Vit A","Vit D","Vit B"], a:"Vit C"}
];

let testSet = [], curr = 0, score = 0;

// Countdown
setInterval(() => {
    const diff = new Date("April 15, 2027") - new Date();
    const days = Math.floor(diff / (1000 * 60 * 60 * 24));
    document.getElementById('timer').innerText = days + " Din Baaki (15 April 2027)";
}, 1000);

function start(mode) {
    testSet = mode === 'All' ? bank : bank.filter(x => x.s === mode);
    testSet = testSet.sort(() => 0.5 - Math.random()).slice(0, 10);
    document.getElementById('home-screen').style.display = 'none';
    document.getElementById('quiz-screen').style.display = 'block';
    showQ();
}

function showQ() {
    if(curr >= testSet.length) { 
        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        document.getElementById('score-text').innerText = score + " / " + testSet.length;
        return; 
    }
    const q = testSet[curr];
    document.getElementById('sub-name').innerText = q.s;
    document.getElementById('q-count').innerText = (curr+1) + " / " + testSet.length;
    document.getElementById('question').innerText = q.q;
    
    const box = document.getElementById('options-box');
    box.innerHTML = "";
    q.o.forEach(opt => {
        const b = document.createElement('button');
        b.className = "opt";
        b.innerText = opt;
        b.onclick = () => {
            if(opt === q.a) score++;
            curr++; showQ();
        };
        box.appendChild(b);
    });
}
</script>
</body>
</html>
