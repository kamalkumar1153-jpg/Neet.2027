<!DOCTYPE html>
<html>
<head>
  <title>NEET Pro App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body { font-family: Arial; background:#0f172a; color:white; padding:10px;}
    .card { background:#1e293b; padding:15px; border-radius:10px; margin-top:10px;}
    button { width:100%; padding:10px; margin:5px 0; border:none; border-radius:8px;}
    .option { background:#334155; }
    .correct { background:green !important; }
    .wrong { background:red !important; }
    #nextBtn { background:orange; }
  </style>
</head>

<body>

<h2>🔥 NEET Pro App</h2>

<input id="name" placeholder="Enter Name">
<button onclick="startQuiz()">Start Quiz</button>

<div id="quiz" style="display:none;">
  <h3 id="timer">Time: 30</h3>

  <div class="card">
    <h3 id="question"></h3>
    <div id="options"></div>
  </div>

  <button id="nextBtn">Next</button>
</div>

<h3 id="result"></h3>

<div class="card">
  <h3>🏆 Leaderboard</h3>
  <div id="board"></div>
</div>

<script src="questions.js"></script>

<script>
let index=0, score=0, timer, time=30, username="";

function startQuiz(){
  username = document.getElementById("name").value;
  if(!username) return alert("Enter name");

  document.getElementById("quiz").style.display="block";
  loadQuestion();
}

function startTimer(){
  clearInterval(timer);
  time=30;
  timer=setInterval(()=>{
    time--;
    document.getElementById("timer").innerText="Time: "+time;
    if(time==0){
      clearInterval(timer);
      nextQuestion();
    }
  },1000);
}

function loadQuestion(){
  if(index>=questions.length){
    finishQuiz();
    return;
  }

  let q=questions[index];
  document.getElementById("question").innerText=`Q${index+1}: ${q.q}`;

  let html="";
  q.options.forEach((opt,i)=>{
    html+=`<button class="option" onclick="check(${i},this)">${opt}</button>`;
  });

  document.getElementById("options").innerHTML=html;
  startTimer();
}

function check(ans,btn){
  let correct=questions[index].answer;
  let all=document.querySelectorAll(".option");

  all.forEach(b=>b.disabled=true);

  if(ans==correct){
    btn.classList.add("correct");
    score+=4;
  }else{
    btn.classList.add("wrong");
    all[correct].classList.add("correct");
    score-=1;
  }

  clearInterval(timer);
}

function nextQuestion(){
  index++;
  loadQuestion();
}

document.getElementById("nextBtn").onclick=nextQuestion;

function finishQuiz(){
  document.getElementById("quiz").style.display="none";
  document.getElementById("result").innerText="Score: "+score;

  saveScore();
}

// ===== Firebase =====
const firebaseConfig = {
  databaseURL: "https://console.firebase.google.com/project/neet-2027-9792f/database/neet-2027-9792f-default-rtdb/data/~2F"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

function saveScore(){
  db.ref("scores").push({
    name: username,
    score: score
  });
}

db.ref("scores").on("value", snap=>{
  let data=snap.val();
  let html="";
  for(let k in data){
    html+=`<p>${data[k].name} - ${data[k].score}</p>`;
  }
  document.getElementById("board").innerHTML=html;
});
</script>

<!-- Firebase CDN -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

</body>
</html>
