<head>
  <title>NEET Quiz</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #333;
    }

    .container {
      max-width: 500px;
      margin: auto;
      padding: 15px;
    }

    .header {
      text-align: center;
      color: white;
      margin-top: 20px;
    }

    .card {
      background: white;
      border-radius: 20px;
      padding: 20px;
      margin-top: 20px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    }

    .progress-bar {
      height: 10px;
      background: #ddd;
      border-radius: 10px;
      overflow: hidden;
      margin: 10px 0;
    }

    .progress {
      height: 100%;
      width: 0%;
      background: #4CAF50;
      transition: 0.3s;
    }

    h2, h3 {
      margin: 5px;
    }

    button {
      display: block;
      width: 100%;
      padding: 16px;
      margin: 10px 0;
      font-size: 18px;
      border-radius: 12px;
      border: none;
      background: #f1f1f1;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #ddd;
    }

    button:active {
      transform: scale(0.96);
    }

    .next-btn {
      background: #667eea;
      color: white;
      font-weight: bold;
    }
  </style>
</head>
