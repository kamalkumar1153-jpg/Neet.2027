<!DOCTYPE html>
<html>
<head>
  <title>NEET AI Quiz Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{
      font-family:sans-serif;
      margin:0;
      background:linear-gradient(135deg,#667eea,#764ba2);
      color:white;
    }

    .container{
      max-width:500px;
      margin:auto;
      padding:15px;
    }

    select{
      width:100%;
      padding:12px;
      border-radius:10px;
      border:none;
      margin-bottom:10px;
    }

    .card{
      background:white;
      color:black;
      padding:20px;
      border-radius:15px;
    }

    button{
      width:100%;
      padding:15px;
      margin:10px 0;
      border:none;
      border-radius:10px;
      font-size:16px;
      cursor:pointer;
      transition:0.3s;
    }

    button:hover{
      transform:scale(1.05);
    }

    .correct{background:green;color:white;}
    .wrong{background:red;color:white;}

  </style>
</head>

<body>

<div class="container">

  <h2>📚 NEET AI Quiz</h2>

  <!-- Chapter Select -->
  <select id="chapterSelect">
    <option value="Biology">Biology</option>
    <option value="Chemistry">Chemistry</option>
    <option value="Physics">Physics</option>
  </select>

  <button onclick="startQuiz()">Start Test 🚀</button>

  <h3 id="qno"></h3>
  <h3 id="timer"></h3>
  <h3 id="score"></h3>

  <div id="quiz" class="card"></div>

  <button onclick="nextQ()">Next ➡️</button>

</div>

<script>

// 📚 Chapter-wise Question Bank
const chapters = {

Biology: [
{q:"Site of Calvin cycle?",options:["Stroma","Thylakoid","Cytoplasm","Mitochondria"],answer:0},
{q:"Powerhouse of cell?",options:["Mitochondria","Nucleus","Ribosome","Golgi"],answer:0},
{q:"RBC function?",options:["O2 transport","Defense","Clotting","Storage"],answer:0},
{q:"Kidney unit?",options:["Nephron","Neuron","Alveoli","Villus"],answer:0},
{q:"Plant hormone?",options:["Auxin","Insulin","Testosterone","Adrenaline"],answer:0}
],

Chemistry: [
{q:"pH < 7 means?",options:["Acidic","Basic","Neutral","Salt"],answer:0},
{q:"Strong acid?",options:["HCl","NH3","NaOH","CH3COOH"],answer:0},
{q:"Mole value?",options:["6.022e23","3e8","1.6e-19","9.8"],answer:0},
{q:"Bond in NaCl?",options:["Ionic","Covalent","Metallic","Hydrogen"],answer:0},
{q:"Gas constant?",options:["8.314","1.38","9.8","6.02"],answer:0}
],

Physics: [
{q:"Unit of force?",options:["Newton","Joule","Watt","Pascal"],answer:0},
{q:"Ohm law?",options:["V=IR","F=ma","E=mc2","P=VI"],answer:0},
{q:"Speed formula?",options:["d/t","t/d","d*t","t+d"],answer:0},
{q:"Light speed?",options:["3e8","1e6","9.8","5e7"],answer:0},
{q:"Work formula?",options:["F*d","m*a","V*I","P*t"],answer:0}
]

};

// 🔀 Generate Questions
function generateQuestions(count=10){
  let chapter = document.getElementById("chapterSelect").value;
  let data = [...chapters[chapter]].sort(()=>Math.random()-0.5);

  return data.slice(0,count).map(q=>{
    let opts = [...q.options].sort(()=>Math.random()-0.5);
    return {
      q:q.q,
      options:opts,
      answer:opts.indexOf(q.options[q.answer]),
      chapter:chapter
    };
  });
}

// 🔥 Quiz variables
let questions = [];
let index = 0;
let score = 0;
let time = 15;
let timer;

// ▶️ Start quiz
function startQuiz(){
  questions = generateQuestions(5);
  index = 0;
  score = 0;
  loadQ();
}

// 📥 Load question
function loadQ(){
  clearInterval(timer);
  time = 15;

  document.getElementById("qno").innerText=`Q ${index+1}/${questions.length}`;
  document.getElementById("score").innerText=`Score: ${score}`;
  document.getElementById("timer").innerText=`Time: ${time}`;

  let q = questions[index];

  document.getElementById("quiz").innerHTML = `
    <h3>${q.q}</h3>
    ${q.options.map((opt,i)=>
      `<button onclick="checkAns(${i}, this)">${opt}</button>`
    ).join("")}
  `;

  timer = setInterval(()=>{
    time--;
    document.getElementById("timer").innerText=`Time: ${time}`;
    if(time==0) nextQ();
  },1000);
}

// 🧠 Weak tracking
let weak = JSON.parse(localStorage.getItem("weak") || "{}");

function updateWeak(q, correct){
  if(!weak[q.chapter]) weak[q.chapter]=0;
  if(!correct) weak[q.chapter]++;
  localStorage.setItem("weak", JSON.stringify(weak));
}

// ✅ Check answer
function checkAns(selected,btn){
  let correct = questions[index].answer;
  let buttons = document.querySelectorAll("#quiz button");

  buttons.forEach((b,i)=>{
    if(i==correct) b.classList.add("correct");
    else b.classList.add("wrong");
    b.disabled=true;
  });

  let isCorrect = selected==correct;

  if(isCorrect) score++;

  updateWeak(questions[index], isCorrect);

  document.getElementById("score").innerText=`Score: ${score}`;
}

// ➡️ Next
function nextQ(){
  index++;
  if(index<questions.length){
    loadQ();
  } else {
    finish();
  }
}

// 📊 Finish + Weak Report
function finish(){
  let weak = JSON.parse(localStorage.getItem("weak") || "{}");

  let html = `<h2>📊 Weak Topics Report</h2>`;

  for(let ch in weak){
    html += `<p>${ch} ❌ Mistakes: ${weak[ch]}</p>`;
  }

  html += `<h3>Score: ${score}/${questions.length}</h3>`;
  html += `<button onclick="location.reload()">Restart</button>`;

  document.body.innerHTML = html;
}

</script>

</body>
</html>
