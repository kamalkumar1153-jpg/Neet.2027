let testSet = [], idx = 0, score = 0, userAnswers = [];

function start(mode) {
    testSet = (mode === 'All') ? [...bank] : bank.filter(x => x.s === mode);
    testSet.sort(() => 0.5 - Math.random());
    document.getElementById('home-screen').style.display = 'none';
    document.getElementById('quiz-screen').style.display = 'block';
    idx = 0; score = 0; userAnswers = [];
    showQ();
}

function showQ() {
    if(idx >= testSet.length) {
        showFinal();
        return;
    }
    const q = testSet[idx];
    const imgTag = document.getElementById('q-img');
    if(q.img) {
        imgTag.src = q.img;
        imgTag.style.display = "block";
    } else {
        imgTag.style.display = "none";
    }
    document.getElementById('sub-tag').innerText = q.s.toUpperCase();
    document.getElementById('counter').innerText = (idx + 1) + " / " + testSet.length;
    document.getElementById('question').innerText = q.q;
    document.getElementById('live-score').innerText = score;
    document.getElementById('progress-bar').style.width = ((idx / testSet.length) * 100) + "%";
    const box = document.getElementById('options-box');
    box.innerHTML = "";
    q.o.forEach(opt => {
        const b = document.createElement('button');
        b.className = "opt";
        b.innerText = opt;
        b.onclick = () => {
            const ok = (opt === q.a);
            userAnswers.push({ q: q.q, sel: opt, ans: q.a, ok: ok });
            if(ok) score++;
            idx++;
            showQ();
        };
        box.appendChild(b);
    });
}

function showFinal() {
    document.getElementById('quiz-screen').style.display = 'none';
    document.getElementById('result-screen').style.display = 'block';
    document.getElementById('final-score').innerText = score;
    let html = "<h4>Review Mistakes:</h4>";
    let mistakes = userAnswers.filter(a => !a.ok);
    mistakes.forEach(m => {
        html += `<div class="mistake-card"><b>Q:</b> ${m.q}<br><span style="color:var(--error); text-decoration:line-through;">${m.sel}</span> | <span style="color:var(--success)">✅ ${m.ans}</span></div>`;
    });
    document.getElementById('review-box').innerHTML = mistakes.length ? html : "🔥 Perfect Score!";
}
</script>
