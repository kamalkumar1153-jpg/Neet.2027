<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEET Real Test</title>

<style>
body{background:#0f172a;color:white;font-family:sans-serif;margin:0;}
.container{max-width:500px;margin:auto;padding:10px;}
.card{background:#1e293b;padding:12px;border-radius:12px;margin-top:10px;}
button{width:100%;padding:10px;margin:5px 0;border:none;border-radius:8px;background:#3b82f6;color:white;}
.correct{background:#16a34a;}
.wrong{background:#dc2626;}
.omr-btn{
width:30px;height:30px;margin:2px;border-radius:50%;
background:#475569;color:white;border:none;font-size:10px;
}
.answered{background:#22c55e;}
</style>
</head>

<body>
<div class="container">

<h2>🎓 NEET REAL TEST</h2>
<h3 id="timer">01:00:00</h3>

<button onclick="startTest()">Start Test</button>

<div id="quiz" class="card"></div>
<button onclick="next()">Next ➡️</button>

<div class="card">
<h3>OMR</h3>
<div id="omr"></div>
</div>

</div>

<script>

/* ================= REAL QUESTIONS ================= */

const baseQuestions = [

/* BIOLOGY */
{q:"Which of the following statements is correct regarding cell theory?",
options:["It was proposed by Schleiden and Schwann","It explains heredity","It includes viruses","It explains origin of life"],answer:0},

{q:"Which phase of meiosis involves crossing over?",
options:["Prophase I","Metaphase I","Anaphase II","Telophase"],answer:0},

{q:"Which of the following is NOT a function of liver?",
options:["Detoxification","Bile secretion","Insulin production","Glycogen storage"],answer:2},

{q:"Which part of nephron is impermeable to water?",
options:["Ascending limb","Descending limb","Proximal tubule","Distal tubule"],answer:0},

{q:"Photosynthesis occurs in?",
options:["Chloroplast","Mitochondria","Nucleus","Golgi"],answer:0},

/* CHEMISTRY */
{q:"Which of the following has highest boiling point?",
options:["H2O","HF","NH3","CH4"],answer:0},

{q:"Which law relates pressure and volume?",
options:["Boyle's law","Charles law","Avogadro law","Gay Lussac"],answer:0},

{q:"Which has highest electronegativity?",
options:["F","Cl","O","N"],answer:0},

{q:"pH of neutral solution?",
options:["7","0","14","1"],answer:0},

{q:"Which shows hydrogen bonding?",
options:["H2O","CO2","CH4","O2"],answer:0},

/* PHYSICS */
{q:"Acceleration of body moving with constant velocity?",
options:["Zero","Positive","Negative","Infinite"],answer:0},

{q:"Work done when force perpendicular?",
options:["Zero","Maximum","Negative","Infinite"],answer:0},

{q:"Wave not needing medium?",
options:["Light","Sound","Water","Mechanical"],answer:0},

{q:"Unit of resistance?",
options:["Ohm","Volt","Ampere","Watt"],answer:0},

{q:"Ohm’s law?",
options:["V = IR","F = ma","E = mc²","P = VI"],answer:0}

];

/* EXPAND TO 150 */
let questions=[];
baseQuestions.forEach(q=>{
for(let i=0;i<10;i++){
questions.push({...q});
}
});

/* ================= STATE ================= */

let pool=[],index=0,score=0,answers=[];

/* ================= TIMER ================= */

let t=3600;
setInterval(()=>{
let m=Math.floor(t/60);
let s=t%60;
document.getElementById("timer").innerText=`${m}:${s}`;
t--;
},1000);

/* ================= START ================= */

function startTest(){
pool = questions.sort(()=>Math.random()-0.5).slice(0,50);
index=0;score=0;
answers=new Array(50).fill(null);
loadOMR();
loadQ();
}

/* ================= LOAD ================= */

function loadQ(){
let q=pool[index];

let html=`<h3>Q${index+1}: ${q.q}</h3>`;

if(q.img){
html+=`<img src="${q.img}" style="width:100%">`;
}

q.options.forEach((o,i)=>{
html+=`<button onclick="ans(${i},this)">${o}</button>`;
});

document.getElementById("quiz").innerHTML=html;
}

/* ================= ANSWER ================= */

function ans(a,btn){
answers[index]=a;

if(a===pool[index].answer){
btn.classList.add("correct");
score+=4;
}else{
btn.classList.add("wrong");
score-=1;
}

document.querySelectorAll(".omr-btn")[index].classList.add("answered");
}

/* ================= NEXT ================= */

function next(){
index++;
if(index<pool.length) loadQ();
else finish();
}

/* ================= OMR ================= */

function loadOMR(){
let html="";
for(let i=0;i<50;i++){
html+=`<button class="omr-btn" onclick="jump(${i})">${i+1}</button>`;
}
document.getElementById("omr").innerHTML=html;
}

function jump(i){
index=i;
loadQ();
}

/* ================= FINISH ================= */

function finish(){
alert("Score: "+score+" / 200");
}

</script>
</body>
</html>
