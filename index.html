<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEET Study Vault - Bitiya</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>NEET Study Vault 📚</h1>
            <div id="countdown" class="badge">Loading...</div>
        </header>

        <div class="status-bar">
            <span id="subject-label" class="subject-tag">Subject</span>
            <span id="q-counter">Q: 0 / 100</span>
            <div id="timer-box">⏱️ <span id="timer">30</span>s</div>
        </div>

        <div class="progress-container">
            <div class="progress-bar" id="myBar"></div>
        </div>

        <div id="quiz-box">
            <h2 id="questionText">Sawal load ho rahe hain...</h2>
            <div id="optionsContainer" class="options-grid"></div>
        </div>

        <div id="review-section" style="display: none;">
            <div id="score-card" class="final-score">⭐ Score: 0</div>
            <h3>Exam Review</h3>
            <div id="wrong-questions-list"></div>
            <button onclick="location.reload()" class="retry-btn">Dubara Test Dein</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="script.js"></script>
</body>
</html>
