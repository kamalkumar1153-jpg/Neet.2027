<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEET AI COACH</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{background:#0f172a;color:white;font-family:sans-serif;margin:0;}
.container{max-width:520px;margin:auto;padding:10px;}
.card{background:#1e293b;padding:12px;border-radius:12px;margin-top:10px;}
button{
width:100%;padding:10px;margin:5px 0;
border:none;border-radius:8px;background:#3b82f6;color:white;
}
button:hover{box-shadow:0 0 12px #3b82f6;}
.correct{background:#16a34a;}
.wrong{background:#dc2626;}
.omr-btn{
width:28px;height:28px;margin:2px;border-radius:50%;
background:#475569;color:white;border:none;font-size:9px;
}
.answered{background:#22c55e;}
.review{background:#facc15;}
</style>
</head>

<body>
<div class="container">

<h2>🎓 NEET AI COACH</h2>
<h3 id="timer">03:00:00</h3>

<button onclick="startAdaptive()">🎯 Adaptive Test</button>
<button onclick="dailyTest()">📅 Daily Test</button>
<button onclick="startMock()">🧪 Full Mock (180Q)</button>

<div id="quiz" class="card"></div>

<button onclick="prev()">⬅️ Prev</button>
<button onclick="next()">Next ➡️</button>

<div class="card">
<h3>OMR</h3>
<div id="omr"></div>
</div>

<div class="card">
<button onclick="askAI()">🤖 AI Teacher</button>
<div id="aiBox"></div>
</div>

<canvas id="chart"></canvas>

</div>

<script>

/* ================= QUESTION BANK ================= */

function qGen(topic){
return {
q:`${topic}: Identify correct statement.`,
options:[
"Correct Answer",
"Trap Option",
"Close Option",
"Confusing Option"
],
answer:0,
topic,
chapter:topic,
img: topic==="Biology"
?"https://upload.wikimedia.org/wikipedia/commons/3/38/Animal_Cell.svg":null
};
}

const questions=[];
for(let i=0;i<90;i++) questions.push(qGen("Biology"));
for(let i=0;i<45;i++) questions.push(qGen("Chemistry"));
for(let i=0;i<45;i++) questions.push(qGen("Physics"));

/* ================= STATE ================= */

let index=0,score=0;
let answers=[],reviewMark=[];
let pool=[];

/* ================= TIMER ================= */

let t=3*3600;
let timer=setInterval(()=>{
let h=Math.floor(t/3600);
let m=Math.floor((t%3600)/60);
let s=t%60;
document.getElementById("timer").innerText=`${h}:${m}:${s}`;
t--;
if(t<=0) finish();
},1000);

/* ================= STATS ================= */

let stats = JSON.parse(localStorage.getItem("stats")) || {};

function updateStats(q,correct){
let ch=q.chapter;
if(!stats[ch]) stats[ch]={attempt:0,correct:0};
stats[ch].attempt++;
if(correct) stats[ch].correct++;
localStorage.setItem("stats",JSON.stringify(stats));
}

function getWeak(){
return Object.keys(stats).filter(k=>{
let a=stats[k];
return a.correct/a.attempt<0.5;
});
}

/* ================= MODES ================= */

function startAdaptive(){
let weak=getWeak();
pool=questions.filter(q=>weak.length?weak.includes(q.chapter):true);
initTest(50);
}

function dailyTest(){
let seed=new Date().toDateString();
pool=questions.sort((a,b)=>seed.localeCompare(b.q));
initTest(50);
}

function startMock(){
pool=[...questions];
initTest(180);
}

/* ================= INIT ================= */

function initTest(n){
pool=pool.sort(()=>Math.random()-0.5).slice(0,n);
index=0;score=0;
answers=new Array(n).fill(null);
reviewMark=new Array(n).fill(false);
loadOMR(n);
loadQ();
}

/* ================= LOAD ================= */

function loadQ(){
let q=pool[index];
let html=`<h3>Q${index+1}: ${q.q}</h3>`;

if(q.img){
html+=`<img src="${q.img}" style="width:100%;border-radius:10px">`;
}

q.options.forEach((o,i)=>{
html+=`<button onclick="answer(${i},this)">${o}</button>`;
});

html+=`<button onclick="markReview()">⭐ Review</button>`;

document.getElementById("quiz").innerHTML=html;
}

/* ================= ANSWER ================= */

function answer(a,btn){
answers[index]=a;
let correct=(a===pool[index].answer);
updateStats(pool[index],correct);

if(correct){btn.classList.add("correct");score+=4;}
else{btn.classList.add("wrong");score-=1;}

updateOMR();
}

/* ================= NAV ================= */

function next(){if(index<pool.length-1){index++;loadQ();}}
function prev(){if(index>0){index--;loadQ();}}

/* ================= REVIEW ================= */

function markReview(){
reviewMark[index]=true;
updateOMR();
}

/* ================= OMR ================= */

function loadOMR(n){
let html="";
for(let i=0;i<n;i++){
html+=`<button class="omr-btn" onclick="jump(${i})">${i+1}</button>`;
}
document.getElementById("omr").innerHTML=html;
}

function updateOMR(){
let btns=document.querySelectorAll(".omr-btn");
btns.forEach((b,i)=>{
b.classList.remove("answered","review");
if(answers[i]!=null) b.classList.add("answered");
if(reviewMark[i]) b.classList.add("review");
});
}

function jump(i){index=i;loadQ();}

/* ================= AI ================= */

function askAI(){
let weak=getWeak();
document.getElementById("aiBox").innerHTML=
weak.length?"⚠️ Weak: "+weak.join(", "):"🔥 Strong performance!";
}

/* ================= RANK ================= */

function rank(score){
if(score>650)return"AIR < 100 🏆";
if(score>600)return"AIR < 1000 🔥";
if(score>500)return"Good 👍";
return"Improve";
}

/* ================= GRAPH ================= */

function graph(){
let labels=[],data=[];
Object.keys(stats).forEach(k=>{
labels.push(k);
let a=stats[k];
data.push(Math.round((a.correct/a.attempt)*100));
});
new Chart(document.getElementById("chart"),{
type:"bar",
data:{labels:labels,datasets:[{data:data}]}
});
}

/* ================= FINISH ================= */

function finish(){
clearInterval(timer);

score=0;
answers.forEach((a,i)=>{
if(a===pool[i].answer) score+=4;
else if(a!=null) score-=1;
});

graph();

alert(`Score: ${score}/720\nRank: ${rank(score)}`);
}

</script>
</body>
</html>
