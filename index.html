<!DOCTYPE html>
<html>
<head>
  <title>NEET Quiz Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      background: linear-gradient(135deg, #667eea, #764ba2);
    }

    .container {
      max-width: 500px;
      margin: auto;
      padding: 15px;
    }

    .header {
      text-align: center;
      color: white;
    }

    .card {
      background: white;
      border-radius: 20px;
      padding: 20px;
      margin-top: 20px;
    }

    .progress-bar {
      height: 10px;
      background: #ddd;
      border-radius: 10px;
      overflow: hidden;
    }

    .progress {
      height: 100%;
      width: 0%;
      background: #4CAF50;
    }

    button {
      width: 100%;
      padding: 18px;
      margin: 10px 0;
      font-size: 18px;
      border-radius: 12px;
      border: none;
      text-align: left;
      background: #f5f5f5;
      cursor: pointer;
    }

    button.selected { background: #2196F3; color:white; }
    button.correct { background: #4CAF50; color:white; }
    button.wrong { background: #f44336; color:white; }

    .next-btn {
      background: #667eea;
      color: white;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="container">
  <div class="header">
    <h2>📚 NEET Quiz Pro</h2>
    <h3 id="progressText"></h3>
    <h3 id="timer">Time: 15</h3>
    <h3 id="score">Score: 0</h3>
  </div>

  <div class="progress-bar">
    <div class="progress" id="progressBar"></div>
  </div>

  <div id="quiz" class="card"></div>

  <button class="next-btn" onclick="nextQ()">Next ➡️</button>
</div>

<script src="questions.js"></script>

<script>
let index = 0, score = 0, time = 15, timer, answered = false;

function loadQ(){
  clearInterval(timer);
  time = 15;
  answered = false;

  document.getElementById("progressText").innerText =
    `Question ${index+1} / ${questions.length}`;

  document.getElementById("timer").innerText = "Time: " + time;

  let percent = (index / questions.length) * 100;
  document.getElementById("progressBar").style.width = percent + "%";

  let q = questions[index];

  document.getElementById("quiz").innerHTML = `
    <h3>${q.q}</h3>
    ${q.options.map((opt,i)=>
      `<button onclick="selectAns(${i}, this)">
        <b>${String.fromCharCode(65+i)}.</b> ${opt}
      </button>`
    ).join("")}
  `;

  timer = setInterval(()=>{
    time--;
    document.getElementById("timer").innerText = "Time: " + time;
    if(time==0) nextQ();
  },1000);
}

function selectAns(selected,btn){
  if(answered) return;

  let buttons = document.querySelectorAll("#quiz button");
  buttons.forEach(b => b.classList.remove("selected"));

  btn.classList.add("selected");

  setTimeout(()=>{
    checkAns(selected);
  },300);
}

function checkAns(selected){
  answered = true;

  let correct = questions[index].answer;
  let buttons = document.querySelectorAll("#quiz button");

  buttons.forEach((b,i)=>{
    if(i==correct){
      b.classList.add("correct");
    } else if(i==selected){
      b.classList.add("wrong");
    }
    b.disabled = true;
  });

  if(selected==correct) score++;

  document.getElementById("score").innerText="Score: "+score;
}

function nextQ(){
  index++;
  if(index<questions.length){
    loadQ();
  } else {
    document.body.innerHTML=`
      <h2 style="color:white;text-align:center">🎉 Finished</h2>
      <h3 style="color:white;text-align:center">Score: ${score}/${questions.length}</h3>
      <button onclick="location.reload()">Restart</button>
    `;
  }
}

loadQ();
</script>

</body>
</html>
