<!DOCTYPE html>
<html>
<head>
  <title>NEET PRO AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body { font-family: Arial; background:#0f172a; color:white; padding:10px;}
    .card { background:#1e293b; padding:15px; border-radius:12px; margin-top:10px;}
    button { width:100%; padding:10px; margin:5px 0; border:none; border-radius:8px; font-weight:bold;}
    .option { background:#334155; }
    .correct { background:green !important; }
    .wrong { background:red !important; }
    #nextBtn { background:orange; }
  </style>
</head>

<body>

<h2>🔥 NEET PRO AI</h2>

<input id="name" placeholder="Enter Name">

<select id="subject">
  <option value="All">All Subjects</option>
  <option value="Biology">Biology</option>
  <option value="Physics">Physics</option>
  <option value="Chemistry">Chemistry</option>
</select>

<select id="mode">
  <option value="practice">Practice Mode</option>
  <option value="exam">Exam Mode</option>
</select>

<button onclick="startQuiz()">Start Quiz</button>
<button onclick="togglePause()">⏸ Pause</button>

<div id="quiz" style="display:none;">
  <h3 id="timer">Time: 30</h3>

  <div class="card">
    <h3 id="question"></h3>
    <div id="options"></div>
  </div>

  <button id="nextBtn">Next</button>
</div>

<h3 id="result"></h3>
<canvas id="chart"></canvas>

<script>

// ================= SAMPLE QUESTIONS =================
const questions = [
  {q:"LH surge triggers:",options:["Ovulation","Menstruation","Implantation","Fertilization"],answer:0,subject:"Biology",chapter:"Reproduction"},
  {q:"Powerhouse of cell:",options:["Nucleus","Mitochondria","Golgi","ER"],answer:1,subject:"Biology",chapter:"Cell"},
  {q:"Unit of force:",options:["Newton","Joule","Watt","Pascal"],answer:0,subject:"Physics",chapter:"Motion"},
  {q:"Ohm law:",options:["V=IR","F=ma","E=mc²","P=VI"],answer:0,subject:"Physics",chapter:"Electricity"},
  {q:"pH neutral:",options:["0","7","14","1"],answer:1,subject:"Chemistry",chapter:"Basic"}
];

// ================= VARIABLES =================
let filteredQuestions=[], index=0, score=0, timer, time=30;
let correctCount=0, wrongCount=0, attempted=false;
let mode="practice", paused=false;
let answers=[];
let stats = JSON.parse(localStorage.getItem("stats")) || {};

// ================= START =================
function startQuiz(){
  let sub=document.getElementById("subject").value;
  mode=document.getElementById("mode").value;

  filteredQuestions=(sub==="All")?questions:questions.filter(q=>q.subject===sub);
  filteredQuestions=filteredQuestions.sort(()=>0.5-Math.random());

  index=0; score=0; correctCount=0; wrongCount=0; answers=[];
  loadQuestion();
}

// ================= TIMER =================
function startTimer(){
  clearInterval(timer);
  time=30;
  timer=setInterval(()=>{
    time--;
    document.getElementById("timer").innerText="Time: "+time;
    if(time==0){
      clearInterval(timer);
      nextQuestion();
    }
  },1000);
}

// ================= LOAD =================
function loadQuestion(){
  attempted=false;
  document.getElementById("quiz").style.display="block";

  if(index>=filteredQuestions.length){
    finishQuiz();
    return;
  }

  let q=filteredQuestions[index];
  document.getElementById("question").innerText=q.q;

  let html="";
  q.options.forEach((opt,i)=>{
    html+=`<button class="option" onclick="check(${i},this)">${opt}</button>`;
  });

  document.getElementById("options").innerHTML=html;
  startTimer();
}

// ================= CHECK =================
function check(ans,btn){
  let correct=filteredQuestions[index].answer;
  let all=document.querySelectorAll(".option");

  all.forEach(b=>b.disabled=true);
  attempted=true;
  answers[index]=ans;

  let isCorrect=ans===correct;

  if(isCorrect){
    btn.classList.add("correct");
    score+=4;
    correctCount++;
  }else{
    btn.classList.add("wrong");
    all[correct].classList.add("correct");

    if(mode==="exam") score-=1;
    wrongCount++;
  }

  updateStats(filteredQuestions[index], isCorrect);
  clearInterval(timer);
}

// ================= NEXT =================
function nextQuestion(){
  if(!attempted){
    answers[index]=null;
  }
  index++;
  loadQuestion();
}
document.getElementById("nextBtn").onclick=nextQuestion;

// ================= FINISH =================
function finishQuiz(){
  document.getElementById("quiz").style.display="none";

  let total=correctCount+wrongCount;
  let acc= total ? ((correctCount/total)*100).toFixed(1) : 0;

  document.getElementById("result").innerHTML=`
    🔥 Score: ${score}<br>
    🎯 Accuracy: ${acc}%
  `;

  showReview();
  showChart();
}

// ================= REVIEW =================
function showReview(){
  let html="<h3>Review</h3>";

  filteredQuestions.forEach((q,i)=>{
    let user=answers[i];
    let correct=q.answer;

    html+=`<div class="card">
      ${q.q}<br>
      Your: ${user!=null?q.options[user]:"Not Attempted"}<br>
      Correct: ${q.options[correct]}
    </div>`;
  });

  document.getElementById("result").innerHTML+=html;
}

// ================= STATS =================
function updateStats(q,correct){
  let key=q.chapter;

  if(!stats[key]) stats[key]={correct:0,wrong:0};
  correct?stats[key].correct++:stats[key].wrong++;

  localStorage.setItem("stats",JSON.stringify(stats));
}

// ================= CHART =================
function showChart(){
  let labels=[], data=[];

  for(let ch in stats){
    let d=stats[ch];
    let total=d.correct+d.wrong;
    let acc= total ? (d.correct/total)*100 : 0;

    labels.push(ch);
    data.push(acc);
  }

  new Chart(document.getElementById("chart"),{
    type:"bar",
    data:{labels:labels,datasets:[{label:"Accuracy %",data:data}]}
  });
}

// ================= PAUSE =================
function togglePause(){
  if(paused){
    startTimer();
    paused=false;
  }else{
    clearInterval(timer);
    paused=true;
  }
}

</script>

</body>
</html>
