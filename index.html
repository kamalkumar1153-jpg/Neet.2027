<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEET 2027 Study Vault</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>NEET 2027 Prep</h1>
            <div id="countdown">Loading Days...</div>
        </header>

        <div class="search-section">
            <input type="text" id="searchInput" placeholder="Sawal dhoondhein (DNA, Force)..." onkeyup="searchQuestions()">
        </div>

        <div class="status-bar">
            <div id="timer-box">⏰ Time: <span id="timer">30</span>s</div>
            <div id="score-card">⭐ Score: 0</div>
        </div>

        <div class="filter-section">
            <button class="filter-btn active" onclick="filterQuestions('All', this)">All</button>
            <button class="filter-btn" onclick="filterQuestions('Physics', this)">Physics</button>
            <button class="filter-btn" onclick="filterQuestions('Chemistry', this)">Chemistry</button>
            <button class="filter-btn" onclick="filterQuestions('Biology', this)">Biology</button>
        </div>

        <div class="question-card" id="quiz-box">
            <div id="subject-label" class="subject-tag">Subject</div>
            <div id="q-counter">Q: 0 / 100</div>
            <h2 id="questionText">Sawal load ho rahe hain...</h2>
            <div id="optionsContainer" class="options-grid"></div>
        </div>

        <div id="review-section" style="display:none;">
            <h3>❌ Galat Sawal (Review)</h3>
            <div id="wrong-questions-list"></div>
            <button onclick="location.reload()" class="retry-btn">Test Dobara Shuru Karein</button>
        </div>

        <div class="nav-controls" id="nav-btns">
            <button id="prev-btn" disabled>Previous</button>
            <button id="next-btn">Next</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
