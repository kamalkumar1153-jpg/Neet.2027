<!DOCTYPE html>
<html>
<head>
<title>NEET Coaching App</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(135deg,#667eea,#764ba2);
  color:white;
  text-align:center;
}
.container{max-width:500px;margin:auto;padding:15px}
button{
  width:100%;padding:14px;margin:6px 0;
  border:none;border-radius:12px;
}
.card{
  background:white;color:black;
  border-radius:20px;padding:20px;margin-top:10px;
}
.correct{background:#4CAF50!important}
.wrong{background:#f44336!important}
#chat{height:120px;overflow:auto;background:#eee;color:black}
</style>
</head>

<body>
<div class="container">

<h2>📚 NEET Coaching App</h2>

<button onclick="setMode('normal')">Practice</button>
<button onclick="setMode('daily')">Daily</button>
<button onclick="setMode('pyq')">PYQ</button>

<button onclick="openVideos()">🎥 Videos</button>
<button onclick="openNotes()">📄 Notes</button>

<div id="subjects">
<button onclick="showCh('Biology')">Biology</button>
<button onclick="showCh('Chemistry')">Chemistry</button>
<button onclick="showCh('Physics')">Physics</button>
</div>

<div id="chapters"></div>

<div id="quizBox" style="display:none">
<h3 id="info"></h3>
<div id="quiz" class="card"></div>
<button onclick="nextQ()">Next</button>
<button onclick="bookmark()">⭐ Save</button>
</div>

<div class="card">
<h3>🤖 AI Teacher</h3>
<div id="chat"></div>
<input id="input"><button onclick="askAI()">Ask</button>
</div>

<div id="videoSection" style="display:none"></div>

<div id="notesSection" style="display:none">
<input type="file" id="pdfFile">
<input id="noteSubject" placeholder="Subject">
<input id="noteChapter" placeholder="Chapter">
<button onclick="uploadPDF()">Upload</button>
<div id="notesList"></div>
<div id="pdfViewer"></div>
</div>

<canvas id="chart"></canvas>

</div>

<script src="questions.js"></script>

<script>
let subject,chapter,filtered=[];
let index=0,score=0,mode="normal";
let difficulty="easy",weak={},currentQ;

/* MODE */
function setMode(m){mode=m;alert(m)}

/* SUBJECT */
function showCh(sub){
  subject=sub;
  let ch=[...new Set(questions.filter(q=>q.subject==sub).map(q=>q.chapter))];
  let html="";
  ch.forEach(c=>html+=`<button onclick="start('${c}')">${c}</button>`);
  document.getElementById("chapters").innerHTML=html;
}

/* START */
function start(ch){
  chapter=ch;
  filtered = questions;
  index=0;score=0;
  document.getElementById("quizBox").style.display="block";
  loadQ();
}

function loadQ(){
  currentQ=filtered[Math.floor(Math.random()*filtered.length)];
  document.getElementById("info").innerText=subject+" "+chapter;

  let html=`<h3>${currentQ.q}</h3>`;
  currentQ.options.forEach((o,i)=>{
    html+=`<button onclick="check(${i},this)">${o}</button>`;
  });
  document.getElementById("quiz").innerHTML=html;
}

function check(i,btn){
  let c=currentQ.answer;
  let btns=document.querySelectorAll("#quiz button");

  btns.forEach((b,x)=>{
    if(x==c)b.classList.add("correct");
    else b.classList.add("wrong");
    b.disabled=true;
  });

  if(i==c) score++;
  else weak[currentQ.chapter]=(weak[currentQ.chapter]||0)+1;

  document.getElementById("chat").innerHTML+=
  `<p>🤖 Answer: ${currentQ.options[c]}</p>`;
}

function nextQ(){
  index++;
  if(index<20) loadQ();
  else showGraph();
}

/* GRAPH */
function showGraph(){
  new Chart(document.getElementById("chart"),{
    type:'bar',
    data:{labels:Object.keys(weak),datasets:[{data:Object.values(weak)}]}
  });
}

/* AI */
function askAI(){
  let i=document.getElementById("input").value;
  let r="Ask NEET topic";

  if(i.includes("force")) r="F = ma";

  document.getElementById("chat").innerHTML+=`<p>${r}</p>`;
}

/* VIDEOS */
function openVideos(){
  let html="";
  Object.keys(videos).forEach(s=>{
    html+=`<button onclick="loadV('${s}')">${s}</button>`;
  });
  document.getElementById("videoSection").innerHTML=html;
  document.getElementById("videoSection").style.display="block";
}

function loadV(s){
  let html="";
  Object.keys(videos[s]).forEach(c=>{
    videos[s][c].forEach(v=>{
      html+=`<iframe width="100%" src="${v.url}"></iframe>`;
    });
  });
  document.getElementById("videoSection").innerHTML=html;
}

/* NOTES */
function openNotes(){
  document.getElementById("notesSection").style.display="block";
  loadNotes();
}

function uploadPDF(){
  let file=document.getElementById("pdfFile").files[0];
  let reader=new FileReader();
  reader.onload=e=>{
    let notes=JSON.parse(localStorage.getItem("notes")||"[]");
    notes.push({file:e.target.result});
    localStorage.setItem("notes",JSON.stringify(notes));
    loadNotes();
  }
  reader.readAsDataURL(file);
}

function loadNotes(){
  let notes=JSON.parse(localStorage.getItem("notes")||"[]");
  let html="";
  notes.forEach((n,i)=>{
    html+=`<button onclick="view(${i})">Open Note ${i+1}</button>`;
  });
  document.getElementById("notesList").innerHTML=html;
}

function view(i){
  let notes=JSON.parse(localStorage.getItem("notes"));
  document.getElementById("pdfViewer").innerHTML=
  `<iframe src="${notes[i].file}" width="100%" height="400"></iframe>`;
}

/* BOOKMARK */
function bookmark(){
  let b=JSON.parse(localStorage.getItem("bm")||"[]");
  b.push(currentQ);
  localStorage.setItem("bm",JSON.stringify(b));
  alert("Saved");
}
</script>

</body>
</html>
