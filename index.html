<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Vault Pro - Negative Marking</title>
    <style>
        :root { --primary: #6c5ce7; --success: #00b894; --danger: #ff7675; --bg: #f8f9fd; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 15px; display: flex; justify-content: center; }
        .card { width: 100%; max-width: 400px; background: white; padding: 25px; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        h1 { font-size: 22px; text-align: center; color: #2d3436; margin-bottom: 20px; }
        
        /* Toggle Switch */
        .setting-row { display: flex; justify-content: space-between; align-items: center; background: #f1f2f6; padding: 12px 18px; border-radius: 15px; margin-bottom: 20px; font-weight: bold; font-size: 14px; }
        .switch { position: relative; display: inline-block; width: 45px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 24px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--danger); }
        input:checked + .slider:before { transform: translateX(21px); }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .btn { padding: 18px; border-radius: 15px; border: none; background: var(--primary); color: white; font-weight: bold; cursor: pointer; font-size: 14px; transition: 0.2s; }
        .btn-full { background: #0984e3; grid-column: span 2; margin-top: 10px; }
        
        #quiz-screen, #result-screen { display: none; }
        .status { display: flex; justify-content: space-between; margin-bottom: 15px; font-weight: bold; color: var(--primary); font-size: 13px; }
        .score-live { color: var(--success); font-size: 13px; }
        .q-text { font-size: 18px; color: #2d3436; line-height: 1.4; margin-bottom: 20px; font-weight: 600; min-height: 70px; }
        .opt { width: 100%; padding: 16px; margin-bottom: 10px; border: 2px solid #f1f2f6; border-radius: 12px; background: white; text-align: left; cursor: pointer; font-size: 15px; }
        .opt:active { background: #f3f0ff; border-color: var(--primary); }
    </style>
</head>
<body>

<div class="card">
    <div id="home-screen">
        <h1>Bitiya's Study Vault 🎓</h1>
        
        <div class="setting-row">
            <span>⚠️ Negative Marking (-0.25)</span>
            <label class="switch">
                <input type="checkbox" id="neg-toggle">
                <span class="slider"></span>
            </label>
        </div>

        <div class="grid">
            <button class="btn" onclick="start('Physics')">⚛️ Physics</button>
            <button class="btn" onclick="start('Chemistry')">🧪 Chemistry</button>
            <button class="btn" onclick="start('Biology')">🧬 Biology</button>
            <button class="btn btn-full" onclick="start('All')">📝 Full Test (100 Qs)</button>
        </div>
    </div>

    <div id="quiz-screen">
        <div class="status">
            <span id="sub-tag">SUBJECT</span>
            <span class="score-live">Score: <span id="live-score">0</span></span>
            <span id="counter">1 / 100</span>
        </div>
        <div class="q-text" id="question">Loading...</div>
        <div id="options-box"></div>
    </div>

    <div id="result-screen" style="text-align: center;">
        <h2 id="result-msg">Test Complete!</h2>
        <h1 id="final-score" style="font-size: 45px; color: var(--success); margin: 10px 0;">0</h1>
        <p style="color: #636e72;">Negative marking was: <span id="neg-status">Off</span></p>
        <button class="btn btn-full" onclick="location.reload()">Try Again</button>
    </div>
</div>

<script>
// (Previous 100 Questions Bank remains same)
const bank = [
    {s:"Physics", q:"SI unit of Electric Capacitance is?", o:["Farad","Volt","Ohm","Henry"], a:"Farad"},
    {s:"Physics", q:"Lenz's Law is based on conservation of?", o:["Energy","Charge","Momentum","Mass"], a:"Energy"},
    {s:"Physics", q:"Refractive index of Diamond is?", o:["2.42","1.50","1.33","1.00"], a:"2.42"},
    {s:"Chemistry", q:"Chemical formula of Benzene is?", o:["C6H6","CH4","C2H2","C6H12"], a:"C6H6"},
    {s:"Chemistry", q:"pH value of pure water is?", o:["7","1","14","0"], a:"7"},
    {s:"Biology", q:"Powerhouse of the cell is?", o:["Mitochondria","Nucleus","Ribosome","Golgi"], a:"Mitochondria"}
];
// Fill 100 for safety
for(let i=7; i<=100; i++) {
    bank.push({s:"Board Practice", q:"Board Exam Important Question "+i+": Read NCERT carefully.", o:["Correct","W1","W2","W3"], a:"Correct"});
}

let testSet = [], idx = 0, score = 0, useNegative = false;

function start(mode) {
    useNegative = document.getElementById('neg-toggle').checked;
    testSet = mode === 'All' ? bank : bank.filter(x => x.s === mode);
    testSet = testSet.sort(() => 0.5 - Math.random());
    
    document.getElementById('home-screen').style.display = 'none';
    document.getElementById('quiz-screen').style.display = 'block';
    idx = 0; score = 0;
    showQ();
}

function showQ() {
    if(idx >= testSet.length) {
        showFinal();
        return;
    }
    const q = testSet[idx];
    document.getElementById('sub-tag').innerText = q.s.toUpperCase();
    document.getElementById('counter').innerText = (idx + 1) + " / " + testSet.length;
    document.getElementById('live-score').innerText = score.toFixed(2);
    document.getElementById('question').innerText = q.q;
    
    const box = document.getElementById('options-box');
    box.innerHTML = "";
    q.o.forEach(opt => {
        const b = document.createElement('button');
        b.className = "opt";
        b.innerText = opt;
        b.onclick = () => {
            if(opt === q.a) {
                score += 1;
            } else {
                if(useNegative) score -= 0.25;
            }
            idx++; showQ();
        };
        box.appendChild(b);
    });
}

function showFinal() {
    document.getElementById('quiz-screen').style.display = 'none';
    document.getElementById('result-screen').style.display = 'block';
    document.getElementById('final-score').innerText = score.toFixed(2);
    document.getElementById('neg-status').innerText = useNegative ? "ON (-0.25)" : "OFF";
    document.getElementById('final-score').style.color = score < 0 ? "var(--danger)" : "var(--success)";
}
</script>
</body>
</html>
