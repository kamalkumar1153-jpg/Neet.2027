<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEET PRO MAX</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{margin:0;font-family:sans-serif;background:#0f172a;color:white;}
.container{max-width:500px;margin:auto;padding:10px;}

.card{background:#1e293b;padding:12px;border-radius:12px;margin-top:10px;}

button{width:100%;padding:10px;margin:5px 0;border:none;border-radius:8px;background:#3b82f6;color:white;}
button:hover{background:#2563eb;}

.subjects button{width:32%;display:inline-block;background:#475569;}

.correct{background:#16a34a;}
.wrong{background:#dc2626;}

.video-row{display:flex;overflow-x:auto;gap:10px;}
.video-card{min-width:120px;cursor:pointer;}
.video-card img{width:100%;border-radius:10px;}

.omr-btn{
width:30px;height:30px;margin:2px;border-radius:50%;
border:none;background:#475569;color:white;font-size:10px;
}
.omr-answered{background:#22c55e;}
</style>
</head>

<body>
<div class="container">

<h2>🎓 NEET PRO MAX</h2>

<h3 id="timer">03:00:00</h3>

<!-- VIDEO -->
<div class="card">
<h3>Video Lectures</h3>
<div id="videoList" class="video-row"></div>
<iframe id="videoPlayer" width="100%" height="180"></iframe>
</div>

<!-- SUBJECT -->
<div class="card">
<div class="subjects">
<button onclick="setSubject('Biology')">Bio</button>
<button onclick="setSubject('Chemistry')">Chem</button>
<button onclick="setSubject('Physics')">Phy</button>
</div>
</div>

<!-- CHAPTER -->
<select onchange="setChapter(this.value)" style="width:100%;padding:8px;border-radius:8px;">
<option value="all">All Chapters</option>
<option>Cell</option>
<option>Human Physiology</option>
<option>Thermodynamics</option>
<option>Laws of Motion</option>
</select>

<button onclick="startTest()">Start Test</button>
<button onclick="startFullTest()">Full Test (180)</button>

<div id="quizBox" class="card"></div>
<button onclick="nextQ()">Next ➡️</button>

<!-- OMR -->
<div class="card">
<h3>OMR Sheet</h3>
<div id="omr"></div>
</div>

<!-- AI -->
<div class="card">
<button onclick="askAI()">AI Explain</button>
<div id="aiBox"></div>
</div>

<canvas id="chart"></canvas>

</div>

<script>

// ================= QUESTIONS =================
const questions=[];
function add(q){questions.push(q);}

// 150 Questions
["Biology","Chemistry","Physics"].forEach(sub=>{
for(let i=1;i<=50;i++){
add({
q:`${sub} Question ${i}`,
options:["A","B","C","D"],
answer:0,
topic:sub,
chapter:"Cell"
});
}
});

// ================= STATE =================
let subject="Biology";
let chapter="all";
let index=0,score=0,currentQ;
let asked=[],weak={};
let fullTest=false,fullSet=[];
let answers=[];

// ================= TIMER =================
let totalTime=3*60*60;
let timerInterval;

function startTimer(){
clearInterval(timerInterval);
timerInterval=setInterval(()=>{
let h=Math.floor(totalTime/3600);
let m=Math.floor((totalTime%3600)/60);
let s=totalTime%60;

document.getElementById("timer").innerText=
`${h.toString().padStart(2,"0")}:${m.toString().padStart(2,"0")}:${s.toString().padStart(2,"0")}`;

totalTime--;

if(totalTime<0){
clearInterval(timerInterval);
finish();
}
},1000);
}

// ================= VIDEO =================
const videos={
Biology:[{thumb:"https://img.youtube.com/vi/URUJD5NEXC8/0.jpg",url:"https://www.youtube.com/embed/URUJD5NEXC8"}],
Chemistry:[{thumb:"https://img.youtube.com/vi/2z1c0v9fY1M/0.jpg",url:"https://www.youtube.com/embed/2z1c0v9fY1M"}],
Physics:[{thumb:"https://img.youtube.com/vi/ZM8ECpBuQYE/0.jpg",url:"https://www.youtube.com/embed/ZM8ECpBuQYE"}]
};

function loadVideos(){
let list=document.getElementById("videoList");
list.innerHTML="";
videos[subject].forEach((v,i)=>{
list.innerHTML+=`<div class="video-card" onclick="playVideo(${i})"><img src="${v.thumb}"></div>`;
});
playVideo(0);
}

function playVideo(i){
document.getElementById("videoPlayer").src=videos[subject][i].url;
}

// ================= FILTER =================
function setSubject(s){subject=s;loadVideos();}
function setChapter(c){chapter=c;}

// ================= TEST =================
function startTest(){
fullTest=false;
index=0;score=0;asked=[];weak={};
startTimer();
loadQ();
}

function loadQ(){
let filtered=questions.filter(q=>q.topic===subject);
currentQ=filtered[Math.floor(Math.random()*filtered.length)];

let html=`<h3>${currentQ.q}</h3>`;
currentQ.options.forEach((o,i)=>{
html+=`<button onclick="checkAns(${i},this)">${o}</button>`;
});
document.getElementById("quizBox").innerHTML=html;
}

// ================= FULL TEST =================
function startFullTest(){
fullTest=true;
index=0;score=0;
startTimer();

let bio=questions.filter(q=>q.topic==="Biology").slice(0,90);
let chem=questions.filter(q=>q.topic==="Chemistry").slice(0,45);
let phy=questions.filter(q=>q.topic==="Physics").slice(0,45);

fullSet=[...bio,...chem,...phy];

loadOMR(180);
answers=new Array(180).fill(null);

loadFullQ();
}

function loadFullQ(){
currentQ=fullSet[index];

let html=`<h3>Q${index+1}: ${currentQ.q}</h3>`;
currentQ.options.forEach((o,i)=>{
html+=`<button onclick="checkAns(${i},this)">${o}</button>`;
});
document.getElementById("quizBox").innerHTML=html;
}

// ================= OMR =================
function loadOMR(total){
let html="";
for(let i=0;i<total;i++){
html+=`<button class="omr-btn" onclick="goQ(${i})">${i+1}</button>`;
}
document.getElementById("omr").innerHTML=html;
}

function goQ(i){
index=i;
loadFullQ();
}

// ================= ANSWER =================
function checkAns(ans,btn){
let btns=document.querySelectorAll("#quizBox button");
btns.forEach(b=>b.disabled=true);

answers[index]=ans;

let omrBtns=document.querySelectorAll(".omr-btn");
if(omrBtns[index]) omrBtns[index].classList.add("omr-answered");

if(ans===currentQ.answer){
btn.classList.add("correct");
score+=4;
}else{
btn.classList.add("wrong");
score-=1;
}
}

// ================= NEXT =================
function nextQ(){
index++;
if(fullTest){
if(index<fullSet.length) loadFullQ();
else finish();
return;
}
if(index<20) loadQ();
else finish();
}

// ================= AI =================
function askAI(){
let ans=currentQ.options[currentQ.answer];
document.getElementById("aiBox").innerHTML="Correct: "+ans;
}

// ================= RANK =================
function calculateRank(score){
if(score>650)return"Top 100";
if(score>600)return"Top 1K";
if(score>500)return"Top 10K";
return"Improve";
}

// ================= FINISH =================
function finish(){
clearInterval(timerInterval);

let rank=calculateRank(score);

new Chart(document.getElementById("chart"),{
type:"bar",
data:{labels:["Score"],datasets:[{data:[score]}]}
});

alert("Score: "+score+" Rank: "+rank);
}

// INIT
loadVideos();

</script>

</body>
</html>
