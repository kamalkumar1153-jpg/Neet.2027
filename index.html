<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEET AI PRO MAX - 180Q Full Mock</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #3b82f6; --success: #22c55e; --error: #ef4444; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; padding: 10px; }
        .container { max-width: 500px; margin: auto; }
        .header { display: flex; justify-content: space-between; padding: 15px; background: var(--card); border-radius: 12px; margin-bottom: 10px; border-bottom: 4px solid var(--accent); position: sticky; top: 0; z-index: 100; }
        .card { background: var(--card); padding: 15px; border-radius: 15px; margin-bottom: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .q-text { font-size: 1.1rem; margin-bottom: 15px; }
        .opt-btn { width: 100%; padding: 12px; margin: 5px 0; border: 1px solid #334155; border-radius: 8px; background: #2d3748; color: white; text-align: left; cursor: pointer; }
        .opt-btn.correct { background: var(--success) !important; }
        .opt-btn.wrong { background: var(--error) !important; }
        .nav-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; background: var(--accent); color: white; }
        .omr-grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 5px; margin-top: 10px; }
        .dot { aspect-ratio: 1; border-radius: 50%; border: 1px solid #475569; background: transparent; color: #94a3b8; font-size: 0.7rem; cursor: pointer; }
        .dot.active { border: 2px solid white; color: white; }
        .dot.filled { background: var(--success); color: white; border: none; }
    </style>
</head>
<body>

<div class="container">
    <div id="menu" class="card" style="text-align:center;">
        <h2>🧠 NEET AI PRO MAX</h2>
        <p>180 Questions | 3 Hours | Negative Marking</p>
        <button class="btn" style="width:100%;" onclick="startExam()">🚀 Start Full Mock Test</button>
    </div>

    <div id="exam-area" style="display:none;">
        <div class="header">
            <div id="timer" style="color:#fbbf24; font-weight:bold;">03:00:00</div>
            <div style="background:var(--accent); padding:2px 10px; border-radius:5px;">Score: <span id="score">0</span></div>
        </div>

        <div class="card" id="question-box"></div>

        <div class="nav-grid">
            <button class="btn" style="background:#475569" onclick="changeQ(-1)">⬅️ Prev</button>
            <button class="btn" onclick="changeQ(1)">Next ➡️</button>
        </div>

        <div class="card">
            <h4 style="margin:0 0 10px 0">OMR Sheet</h4>
            <div id="omr-grid" class="omr-grid"></div>
        </div>
    </div>
</div>

<script>
// ===== 180 QUESTIONS DATABASE (NEET PATTERN) =====
const BASE = [
    // BIOLOGY
    {q:"Powerhouse of cell is:", opts:["Mitochondria","Golgi","Lysosome","Nucleus"], ans:0, sub:"Bio"},
    {q:"Insulin is secreted by:", opts:["Alpha cells","Beta cells","Delta cells","Liver"], ans:1, sub:"Bio"},
    {q:"Functional unit of Kidney:", opts:["Neuron","Nephron","Alveoli","Hepatocyte"], ans:1, sub:"Bio"},
    {q:"Double fertilization is found in:", opts:["Angiosperms","Gymnosperms","Algae","Bryophytes"], ans:0, sub:"Bio"},
    {q:"Hormone for 'Fight or Flight' response:", opts:["Adrenaline","Insulin","Thyroxine","Oxytocin"], ans:0, sub:"Bio"},
    {q:"Father of Genetics:", opts:["Gregor Mendel","Darwin","Lamarck","Morgan"], ans:0, sub:"Bio"},
    {q:"Where does Glycolysis occur?", opts:["Cytoplasm","Mitochondria","Ribosome","Golgi"], ans:0, sub:"Bio"},
    {q:"Which hormone triggers Ovulation?", opts:["LH","FSH","Progesterone","Estrogen"], ans:0, sub:"Bio"},
    {q:"The 'P' wave in ECG represents:", opts:["Atrial depolarization","Ventricular depolarization","Atrial repolarization","Resting state"], ans:0, sub:"Bio"},
    {q:"Smallest cell in human body:", opts:["Sperm cell","Ovum","Neuron","RBC"], ans:0, sub:"Bio"},
    
    // CHEMISTRY
    {q:"Most electronegative element:", opts:["Fluorine","Chlorine","Oxygen","Nitrogen"], ans:0, sub:"Chem"},
    {q:"pH of a neutral solution:", opts:["7","0","1","14"], ans:0, sub:"Chem"},
    {q:"Hybridization of Carbon in Methane:", opts:["sp3","sp2","sp","dsp2"], ans:0, sub:"Chem"},
    {q:"Chemical formula of Baking Soda:", opts:["NaHCO3","Na2CO3","NaOH","NaCl"], ans:0, sub:"Chem"},
    {q:"Gas used in fire extinguishers:", opts:["CO2","O2","N2","H2"], ans:0, sub:"Chem"},
    
    // PHYSICS
    {q:"Unit of Electric Current:", opts:["Ampere","Volt","Ohm","Watt"], ans:0, sub:"Phy"},
    {q:"Speed of light in vacuum (m/s):", opts:["3x10^8","3x10^6","2x10^8","3x10^10"], ans:0, sub:"Phy"},
    {q:"Newton's First Law is also known as:", opts:["Law of Inertia","Momentum","Action-Reaction","Gravity"], ans:0, sub:"Phy"},
    {q:"Mirror used as rear-view in vehicles:", opts:["Convex","Concave","Plain","Cylindrical"], ans:0, sub:"Phy"},
    {q:"Device that converts AC to DC:", opts:["Rectifier","Inverter","Transformer","Generator"], ans:0, sub:"Phy"}
];

// DATA GENERATOR (180 Questions)
let questions = [];
let userAns = [];
let currentIdx = 0;
let score = 0;

function startExam() {
    // Generate 180 questions by shuffling and repeating BASE data
    while(questions.length < 180) {
        let shuffleBase = [...BASE].sort(() => Math.random() - 0.5);
        questions.push(...shuffleBase);
    }
    questions = questions.slice(0, 180);
    userAns = new Array(180).fill(null);

    document.getElementById('menu').style.display = 'none';
    document.getElementById('exam-area').style.display = 'block';
    
    renderOMR();
    loadQ();
    startTimer(10800); // 3 Hours
}

function loadQ() {
    let q = questions[currentIdx];
    let html = `<div style="font-size:0.8rem; color:var(--accent); font-weight:bold;">${q.sub.toUpperCase()} | Q${currentIdx+1}</div>
                <div class="q-text">${q.q}</div>`;
    
    q.opts.forEach((opt, i) => {
        let cls = "";
        if(userAns[currentIdx] !== null) {
            if(i === q.ans) cls = "correct";
            else if(i === userAns[currentIdx]) cls = "wrong";
        }
        html += `<button class="opt-btn ${cls}" onclick="submit(${i})">${opt}</button>`;
    });
    
    document.getElementById('question-box').innerHTML = html;
    updateOMR();
}

function submit(choice) {
    if(userAns[currentIdx] !== null) return; // Lock after click
    
    userAns[currentIdx] = choice;
    if(choice === questions[currentIdx].ans) score += 4;
    else score -= 1;
    
    document.getElementById('score').innerText = score;
    loadQ();
}

function changeQ(step) {
    let next = currentIdx + step;
    if(next >= 0 && next < 180) {
        currentIdx = next;
        loadQ();
    }
}

function renderOMR() {
    let html = "";
    for(let i=0; i<180; i++) {
        html += `<button class="dot" id="dot-${i}" onclick="jump(${i})">${i+1}</button>`;
    }
    document.getElementById('omr-grid').innerHTML = html;
}

function updateOMR() {
    document.querySelectorAll('.dot').forEach((d, i) => {
        d.classList.remove('active');
        if(i === currentIdx) d.classList.add('active');
        if(userAns[i] !== null) d.classList.add('filled');
    });
}

function jump(i) { currentIdx = i; loadQ(); }

function startTimer(t) {
    setInterval(() => {
        let h = Math.floor(t / 3600);
        let m = Math.floor((t % 3600) / 60);
        let s = t % 60;
        document.getElementById('timer').innerText = 
            `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
        if(t <= 0) alert("Time Up! Score: " + score);
        t--;
    }, 1000);
}
</script>
</body>
</html>
