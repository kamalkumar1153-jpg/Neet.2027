<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Vault Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <style>
        :root { --p: #2575fc; --bg: #f8faff; }
        body { margin: 0; font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); padding-bottom: 20px; }
        .container { padding: 20px; }
        .feat-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 25px 0; }
        .feat-btn { background: white; padding: 15px 5px; border-radius: 18px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.03); cursor: pointer; }
        .feat-btn span { display: block; font-size: 10px; font-weight: 700; margin-top: 5px; }
        .page { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 1000; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        .close-btn { position: absolute; top: 20px; right: 20px; font-size: 30px; color: #ff4757; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h2>Study Vault Pro 🎓</h2>

    <div class="feat-row">
        <div class="feat-btn" onclick="openNotes('All')">
            <span class="material-icons-round" style="color: #2575fc;">description</span>
            <span>Notes</span>
        </div>
        <div class="feat-btn" onclick="startTest('All')">
            <span class="material-icons-round" style="color: #6c5ce7;">assignment</span>
            <span>MCQs</span>
        </div>
        <div class="feat-btn" onclick="openPage('diagrams-page')">
            <span class="material-icons-round" style="color: #ff9f43;">trending_up</span>
            <span>Diagrams</span>
        </div>
        <div class="feat-btn" onclick="alert('No bookmarks saved')">
            <span class="material-icons-round" style="color: #10ac84;">bookmark</span>
            <span>Saved</span>
        </div>
    </div>
</div>

<div id="notes-page" class="page">
    <span class="material-icons-round close-btn" onclick="closePage('notes-page')">cancel</span>
    <h2 id="notes-title">Notes</h2>
    <div id="notes-content"></div>
</div>

<div id="quiz-page" class="page">
    <span class="material-icons-round close-btn" onclick="closePage('quiz-page')">cancel</span>
    <h3>Quiz Mode</h3>
    <p id="q-text" style="font-size: 18px;"></p>
    <div id="options-list"></div>
</div>

<div id="diagrams-page" class="page">
    <span class="material-icons-round close-btn" onclick="closePage('diagrams-page')">cancel</span>
    <h2>Diagram Gallery</h2>
    <p>Physics & Chemistry Diagrams for Board 2027</p>
    <div style="background:#f0f7ff; padding:20px; border-radius:15px; text-align:center; margin-top:20px; border: 2px dashed #2575fc;">
        [Diagrams will appear here]
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
