<!DOCTYPE html>
<html>
<head>
  <title>NEET AI Quiz PRO</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  font-family:sans-serif;
  margin:0;
  background:linear-gradient(135deg,#667eea,#764ba2);
  color:white;
  text-align:center;
}

/* Container */
.container{
  max-width:500px;
  margin:auto;
  padding:15px;
}

/* Card */
.card{
  background:white;
  color:black;
  border-radius:20px;
  padding:20px;
  margin-top:20px;
  box-shadow:0 10px 25px rgba(0,0,0,0.3);
  animation:fade 0.5s ease;
}

/* Animation */
@keyframes fade{
  from{opacity:0; transform:translateY(20px)}
  to{opacity:1}
}

/* Buttons */
button{
  width:100%;
  padding:15px;
  margin:10px 0;
  border:none;
  border-radius:12px;
  font-size:16px;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  transform:scale(1.05);
  box-shadow:0 0 15px #00ffff;
}

/* Correct Wrong */
.correct{background:#4CAF50 !important;color:white}
.wrong{background:#f44336 !important;color:white}

/* Progress */
.progress{
  height:10px;
  background:#ddd;
  border-radius:10px;
}
.progress-bar{
  height:10px;
  background:#00ffcc;
  width:0%;
  border-radius:10px;
}

/* Image */
img{
  width:100%;
  border-radius:10px;
  margin:10px 0;
}

</style>
</head>

<body>

<div class="container">

<h2>📚 NEET AI Quiz</h2>
<h3 id="progress"></h3>
<h3 id="timer">Time: 15</h3>
<h3 id="score">Score: 0</h3>
<h3 id="rank"></h3>

<div class="progress">
  <div class="progress-bar" id="bar"></div>
</div>

<div id="quiz" class="card"></div>

<button onclick="nextQ()">Next ➡️</button>

</div>

<script src="questions.js"></script>

<script>
let index=0;
let score=0;
let time=15;
let timer;
let used=[];
let weakTopics={};

function getRandomQ(){
  let i;
  do{
    i=Math.floor(Math.random()*questions.length);
  }while(used.includes(i));
  used.push(i);
  return questions[i];
}

let currentQ;

function loadQ(){
  clearInterval(timer);
  time=15;

  currentQ = getRandomQ();

  document.getElementById("progress").innerText=
  "Question "+(index+1)+" / 150";

  document.getElementById("score").innerText=
  "Score: "+score;

  document.getElementById("bar").style.width=
  (index/150*100)+"%";

  let html = `<h3>${currentQ.q}</h3>`;

  if(currentQ.img){
    html += `<img src="${currentQ.img}">`;
  }

  currentQ.options.forEach((opt,i)=>{
    html+=`<button onclick="checkAns(${i},this)">${opt}</button>`;
  });

  document.getElementById("quiz").innerHTML=html;

  timer=setInterval(()=>{
    time--;
    document.getElementById("timer").innerText="Time: "+time;
    if(time==0) nextQ();
  },1000);
}

function checkAns(i,btn){
  let correct=currentQ.answer;
  let buttons=document.querySelectorAll("#quiz button");

  buttons.forEach((b,index)=>{
    if(index==correct) b.classList.add("correct");
    else b.classList.add("wrong");
    b.disabled=true;
  });

  if(i==correct){
    score++;
  }else{
    let t=currentQ.topic;
    weakTopics[t]=(weakTopics[t]||0)+1;
  }
}

function nextQ(){
  index++;
  if(index<150){
    loadQ();
  }else{
    showResult();
  }
}

function showResult(){

  let rank="Average";

  if(score>120) rank="Topper 🏆";
  else if(score>90) rank="Good 👍";
  else if(score>60) rank="Average 🙂";
  else rank="Weak 😢";

  let weak=Object.entries(weakTopics)
    .sort((a,b)=>b[1]-a[1])
    .slice(0,3)
    .map(x=>x[0])
    .join(", ");

  document.body.innerHTML=`
  <h2>🎉 Finished</h2>
  <h3>Score: ${score}/150</h3>
  <h3>Rank: ${rank}</h3>
  <h3>Weak Topics: ${weak || "None"}</h3>
  <button onclick="location.reload()">Restart</button>
  `;
}

loadQ();
</script>

</body>
</html>
