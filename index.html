<!DOCTYPE html>
<html>
<head>
  <title>NEET Diagram Quiz</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      background: linear-gradient(135deg, #667eea, #764ba2);
    }

    .container {
      max-width: 500px;
      margin: auto;
      padding: 15px;
    }

    .card {
      background: white;
      border-radius: 20px;
      padding: 20px;
      margin-top: 20px;
    }

    img {
      width: 100%;
      border-radius: 15px;
      margin: 10px 0;
    }

    button {
      width: 100%;
      padding: 15px;
      margin: 8px 0;
      border-radius: 12px;
      border: none;
      font-size: 16px;
      cursor: pointer;
    }

    .correct { background: green; color: white; }
    .wrong { background: red; color: white; }

    .next-btn {
      background: black;
      color: white;
    }
  </style>
</head>

<body>

<div class="container">
  <h2 style="color:white;text-align:center;">📊 Diagram Quiz</h2>
  <h3 id="score" style="color:white;text-align:center;">Score: 0</h3>

  <div id="quiz" class="card"></div>

  <button class="next-btn" onclick="nextQ()">Next ➡️</button>
</div>

<script src="questions.js"></script>

<script>
let index = 0;
let score = 0;

function loadQ(){
  let q = questions[index];

  document.getElementById("quiz").innerHTML = `
    <h3>${q.q}</h3>

    ${q.img ? `<img src="${q.img}">` : ""}

    ${q.options.map((opt,i)=>
      `<button onclick="checkAns(${i}, this)">${opt}</button>`
    ).join("")}
  `;
}

function checkAns(i,btn){
  let correct = questions[index].answer;
  let buttons = document.querySelectorAll("#quiz button");

  buttons.forEach((b,ind)=>{
    if(ind==correct){
      b.classList.add("correct");
    } else {
      b.classList.add("wrong");
    }
    b.disabled=true;
  });

  if(i==correct) score++;

  document.getElementById("score").innerText="Score: "+score;
}

function nextQ(){
  index++;
  if(index<questions.length){
    loadQ();
  } else {
    document.body.innerHTML=`<h2>Finished 🎉</h2><h3>Score: ${score}</h3>`;
  }
}

loadQ();
</script>

</body>
</html>
