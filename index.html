<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Study Vault Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <style>
        :root { --p: #2575fc; --bg: #f8faff; }
        * { box-sizing: border-box; }
        body { margin: 0; font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); padding-bottom: 20px; }
        .container { padding: 20px; }
        .feat-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 25px 0; }
        .feat-btn { background: white; padding: 15px 5px; border-radius: 18px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.03); cursor: pointer; }
        .feat-btn span { display: block; font-size: 10px; font-weight: 700; margin-top: 5px; }
        .page { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 1000; padding: 20px; overflow-y: auto; }
        .close-btn { float: right; font-size: 30px; color: #ff4757; cursor: pointer; }
        .opt-btn { width:100%; padding:15px; margin-bottom:10px; border-radius:12px; border:1px solid #eee; background:white; text-align:left; font-size:15px; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="font-weight:800;">Study Vault Pro 🎓</h2>

    <div class="feat-row">
        <div class="feat-btn" onclick="openNotes('All')"><span class="material-icons-round" style="color:#2575fc">description</span><span>Notes</span></div>
        <div class="feat-btn" onclick="startTest('All')"><span class="material-icons-round" style="color:#6c5ce7">assignment</span><span>MCQs</span></div>
        <div class="feat-btn" onclick="openPage('diagrams-page')"><span class="material-icons-round" style="color:#ff9f43">brush</span><span>Diagrams</span></div>
        <div class="feat-btn" onclick="alert('No bookmarks')"><span class="material-icons-round" style="color:#10ac84">bookmark</span><span>Saved</span></div>
    </div>

    <div style="background:linear-gradient(135deg, #6a11cb, #2575fc); color:white; padding:25px; border-radius:25px; box-shadow:0 10px 20px rgba(37,117,252,0.2);" onclick="startTest('All')">
        <h3 style="margin:0">Start Full Mock Test</h3>
        <p style="margin:5px 0 0; opacity:0.8;">Physics • Chemistry • Biology</p>
    </div>
</div>

<div id="notes-page" class="page"><span class="material-icons-round close-btn" onclick="closePage('notes-page')">cancel</span><h2 id="notes-title" style="margin-top:40px;">Notes</h2><div id="notes-content"></div></div>
<div id="quiz-page" class="page"><span class="material-icons-round close-btn" onclick="closePage('quiz-page')">cancel</span><h3 style="margin-top:40px;">Live Quiz</h3><p id="q-text" style="font-size:18px; font-weight:600;"></p><div id="options-list"></div></div>
<div id="diagrams-page" class="page"><span class="material-icons-round close-btn" onclick="closePage('diagrams-page')">cancel</span><h2 style="margin-top:40px;">Important Diagrams</h2><div style="padding:20px; border:2px dashed #ddd; text-align:center; border-radius:20px;">Diagram Gallery Coming Soon</div></div>

<script src="script.js"></script>
</body>
</html>
