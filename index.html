<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Vault Pro | Chapter Analysis</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card">
    <div id="home-screen">
        <div class="header-section">
            <h1>Study Vault Pro 🎓</h1>
            <p>RBSE Class 12th Master Prep</p>
        </div>
        
        <div class="setting-row">
            <span>⚠️ Negative Marking ON (-0.25)</span>
            <label class="switch">
                <input type="checkbox" id="neg-toggle" checked>
                <span class="slider"></span>
            </label>
        </div>

        <div class="grid">
            <button class="btn physics" onclick="start('Physics')">⚛️ Physics</button>
            <button class="btn chemistry" onclick="start('Chemistry')">🧪 Chemistry</button>
            <button class="btn biology" onclick="start('Biology')">🧬 Biology</button>
            <button class="btn btn-full" onclick="start('All')">🚀 Start Full Test (120 Qs)</button>
        </div>
    </div>

    <div id="quiz-screen">
        <div class="status-bar">
            <span id="sub-tag">SUBJECT</span>
            <div class="score-pill">Score: <span id="live-score">0.00</span></div>
            <span id="counter">0 / 120</span>
        </div>
        <div class="progress-container">
            <div id="progress-bar"></div>
        </div>
        <div class="q-text" id="question">Loading...</div>
        <div id="options-box"></div>
    </div>

    <div id="result-screen" style="text-align: center;">
        <div class="icon-result">📊</div>
        <h2>Analysis Report</h2>
        <h1 id="final-score">0.00</h1>
        <div id="review-box" style="margin-top: 20px; text-align: left; max-height: 450px; overflow-y: auto; background: #fdfdfd; padding: 15px; border-radius: 20px; border: 1px solid #eee;"></div>
        <button class="btn btn-full" style="margin-top:20px;" onclick="location.reload()">Take Another Test</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
