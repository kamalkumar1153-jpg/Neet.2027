<!DOCTYPE html>
<html>
<head>
<title>NEET AI Quiz PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  font-family:sans-serif;
  margin:0;
  background:linear-gradient(135deg,#667eea,#764ba2);
  color:white;
  text-align:center;
}

.container{max-width:500px;margin:auto;padding:15px}

button{
  width:100%;
  padding:15px;
  margin:8px 0;
  border:none;
  border-radius:12px;
  font-size:16px;
  cursor:pointer;
  transition:0.3s;
}
button:hover{transform:scale(1.05);box-shadow:0 0 15px cyan}

.card{
  background:white;
  color:black;
  border-radius:20px;
  padding:20px;
  margin-top:20px;
}

.correct{background:#4CAF50!important;color:white}
.wrong{background:#f44336!important;color:white}

.progress{height:10px;background:#ddd;border-radius:10px}
.bar{height:10px;background:#00ffcc;width:0%}

img{width:100%;border-radius:10px}
</style>
</head>

<body>

<div class="container">

<h2>📚 NEET AI Quiz</h2>

<!-- MODE -->
<div>
<button onclick="setMode('normal')">🎯 Practice</button>
<button onclick="setMode('daily')">📅 Daily Test</button>
<button onclick="setMode('pyq')">📘 PYQ</button>
</div>

<!-- SUBJECT -->
<div id="subjects">
<button onclick="showChapters('Biology')">🧬 Biology</button>
<button onclick="showChapters('Chemistry')">⚗️ Chemistry</button>
<button onclick="showChapters('Physics')">⚡ Physics</button>
</div>

<!-- CHAPTER -->
<div id="chapters" style="display:none;"></div>

<!-- QUIZ -->
<div id="quizScreen" style="display:none;">
<h3 id="progress"></h3>
<h3 id="timer"></h3>
<h3 id="score"></h3>

<div class="progress"><div class="bar" id="bar"></div></div>

<div id="quiz" class="card"></div>
<button onclick="nextQ()">Next ➡️</button>
</div>

<!-- GRAPH -->
<canvas id="chart" style="display:none;"></canvas>

</div>

<script src="questions.js"></script>

<script>
let subject,chapter,filtered=[];
let index=0,score=0,time=15,timer;
let weak={};
let mode="normal";
let difficulty="easy";
let currentQ;

function setMode(m){
  mode=m;
  alert("Mode: "+m);
}

function showChapters(sub){
  subject=sub;
  document.getElementById("subjects").style.display="none";

  let ch=[...new Set(questions.filter(q=>q.subject==sub).map(q=>q.chapter))];

  let html="<h3>Select Chapter</h3>";
  ch.forEach(c=>{
    html+=`<button onclick="startQuiz('${c}')">${c}</button>`;
  });

  document.getElementById("chapters").innerHTML=html;
  document.getElementById("chapters").style.display="block";
}

/* 🔥 MODES */
function getDaily(){
  let today=new Date().toDateString();
  let saved=localStorage.getItem("date");

  if(saved===today){
    return JSON.parse(localStorage.getItem("daily"));
  }

  let set=[...questions].sort(()=>Math.random()-0.5).slice(0,20);

  localStorage.setItem("date",today);
  localStorage.setItem("daily",JSON.stringify(set));

  return set;
}

function getPYQ(){
  return questions.filter(q=>q.type=="pyq");
}

function getAI(){
  let set=questions.filter(q=>q.difficulty==difficulty);
  if(set.length==0) set=questions;
  return set;
}

function startQuiz(ch){
  chapter=ch;

  if(mode=="daily") filtered=getDaily();
  else if(mode=="pyq") filtered=getPYQ();
  else filtered=getAI();

  index=0;
  score=0;

  document.getElementById("chapters").style.display="none";
  document.getElementById("quizScreen").style.display="block";

  loadQ();
}

function loadQ(){
  clearInterval(timer);
  time=15;

  currentQ=filtered[Math.floor(Math.random()*filtered.length)];

  document.getElementById("progress").innerText=
  subject+" | "+chapter+" | Q "+(index+1);

  document.getElementById("score").innerText="Score: "+score;
  document.getElementById("bar").style.width=(index/20*100)+"%";

  let html=`<h3>${currentQ.q}</h3>`;
  if(currentQ.img) html+=`<img src="${currentQ.img}">`;

  currentQ.options.forEach((opt,i)=>{
    html+=`<button onclick="checkAns(${i},this)">${opt}</button>`;
  });

  document.getElementById("quiz").innerHTML=html;

  timer=setInterval(()=>{
    time--;
    document.getElementById("timer").innerText="Time: "+time;
    if(time==0) nextQ();
  },1000);
}

function checkAns(i,btn){
  let correct=currentQ.answer;
  let buttons=document.querySelectorAll("#quiz button");

  buttons.forEach((b,index)=>{
    if(index==correct) b.classList.add("correct");
    else b.classList.add("wrong");
    b.disabled=true;
  });

  if(i==correct){
    score++;
    if(score>5) difficulty="medium";
    if(score>10) difficulty="hard";
  }else{
    difficulty="easy";
    weak[currentQ.chapter]=(weak[currentQ.chapter]||0)+1;
  }
}

function nextQ(){
  index++;
  if(index<20){
    loadQ();
  }else{
    showResult();
  }
}

function showResult(){
  document.getElementById("quizScreen").style.display="none";
  document.getElementById("chart").style.display="block";

  let labels=Object.keys(weak);
  let data=Object.values(weak);

  new Chart(document.getElementById("chart"),{
    type:'bar',
    data:{labels:labels,datasets:[{data:data}]}
  });
}
</script>

</body>
</html>
