<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEET AI PRO</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{background:#0f172a;color:white;font-family:sans-serif;margin:0;}
.container{max-width:500px;margin:auto;padding:10px;}
.card{background:#1e293b;padding:10px;border-radius:10px;margin-top:10px;}
button{width:100%;padding:10px;margin:5px 0;border:none;border-radius:8px;background:#3b82f6;color:white;}
.subjects button{width:32%;display:inline-block;background:#475569;}
.correct{background:#16a34a;}
.wrong{background:#dc2626;}
.omr-btn{width:30px;height:30px;margin:2px;border-radius:50%;background:#475569;color:white;border:none;font-size:10px;}
.omr-answered{background:#22c55e;}
</style>
</head>

<body>
<div class="container">

<h2>🎓 NEET AI PRO</h2>
<h3 id="timer">03:00:00</h3>

<!-- SUBJECT -->
<div class="card subjects">
<button onclick="setSubject('Biology')">Bio</button>
<button onclick="setSubject('Chemistry')">Chem</button>
<button onclick="setSubject('Physics')">Phy</button>
</div>

<!-- CHAPTER -->
<select onchange="setChapter(this.value)" style="width:100%;padding:8px;border-radius:8px;">
<option value="all">All Chapters</option>
<option>Cell</option>
<option>Biomolecules</option>
<option>Human Physiology</option>
<option>Plant Physiology</option>
<option>Genetics</option>
</select>

<button onclick="startTest()">Start Test</button>

<div id="quizBox" class="card"></div>
<button onclick="nextQ()">Next ➡️</button>

<!-- OMR -->
<div class="card">
<h3>OMR</h3>
<div id="omr"></div>
</div>

<!-- AI -->
<div class="card">
<button onclick="askAI()">AI Explain</button>
<div id="aiBox"></div>
</div>

<canvas id="chart"></canvas>

</div>

<script>

/* ================= NCERT SYSTEM ================= */
const questions=[];
function add(q){questions.push(q);}

const ncert={
Biology:{
"Cell":[
["Cell is basic unit of life","Life"],
["Cell theory proposed by","Schleiden & Schwann"],
["Prokaryotes lack","Membrane bound organelles"],
["Plasma membrane is","Selective permeable"],
["Fluid mosaic model by","Singer & Nicolson"]
],
"Biomolecules":[
["Protein made of","Amino acids"],
["Enzymes are","Proteins"],
["Nucleic acid unit","Nucleotide"],
["Lipids soluble in","Organic solvents"],
["Polysaccharide example","Starch"]
],
"Human Physiology":[
["RBC life span","120 days"],
["Oxygen carrier","Hemoglobin"],
["Kidney unit","Nephron"],
["Insulin secreted by","Beta cells"],
["Blood filtration","Glomerulus"]
],
"Plant Physiology":[
["Photosynthesis occurs in","Chloroplast"],
["Light reaction site","Thylakoid"],
["Calvin cycle site","Stroma"],
["Water transport tissue","Xylem"],
["Food transport tissue","Phloem"]
],
"Genetics":[
["Father of genetics","Mendel"],
["DNA discovered by","Watson & Crick"],
["Gene is","Unit of heredity"],
["RNA base","Uracil"],
["Chromosomes contain","DNA"]
]
}
};

/* AUTO GENERATE 500+ */
const diff=["easy","medium","hard"];

Object.keys(ncert).forEach(subject=>{
Object.keys(ncert[subject]).forEach(chapter=>{
ncert[subject][chapter].forEach(item=>{
for(let i=0;i<20;i++){
add({
q:item[0]+"?",
options:[item[1],"Wrong1","Wrong2","Wrong3"],
answer:0,
topic:subject,
chapter:chapter,
level:diff[i%3]
});
}
});
});
});

/* ================= STATE ================= */
let subject="Biology",chapter="all";
let index=0,score=0,currentQ;
let pool=[],answers=[];

/* ================= TIMER ================= */
let t=3*3600;
setInterval(()=>{
let h=Math.floor(t/3600);
let m=Math.floor((t%3600)/60);
let s=t%60;
document.getElementById("timer").innerText=
`${h}:${m}:${s}`;
t--;
},1000);

/* ================= FILTER ================= */
function setSubject(s){subject=s;}
function setChapter(c){chapter=c;}

function getQ(){
return questions.filter(q=>q.topic===subject &&
(chapter==="all"||q.chapter===chapter));
}

/* ================= START ================= */
function startTest(){
pool=getQ().sort(()=>Math.random()-0.5).slice(0,50);
index=0;score=0;
answers=new Array(50).fill(null);
loadOMR();
loadQ();
}

/* ================= LOAD ================= */
function loadQ(){
currentQ=pool[index];

let html=`<h3>Q${index+1}: ${currentQ.q}</h3>`;
currentQ.options.forEach((o,i)=>{
html+=`<button onclick="checkAns(${i},this)">${o}</button>`;
});

document.getElementById("quizBox").innerHTML=html;
}

/* ================= ANSWER ================= */
function checkAns(a,btn){
answers[index]=a;

let omr=document.querySelectorAll(".omr-btn");
omr[index].classList.add("omr-answered");

if(a===currentQ.answer){
btn.classList.add("correct");
score+=4;
}else{
btn.classList.add("wrong");
score-=1;
}
}

/* ================= NEXT ================= */
function nextQ(){
index++;
if(index<pool.length) loadQ();
else finish();
}

/* ================= OMR ================= */
function loadOMR(){
let html="";
for(let i=0;i<50;i++){
html+=`<button class="omr-btn" onclick="jump(${i})">${i+1}</button>`;
}
document.getElementById("omr").innerHTML=html;
}

function jump(i){index=i;loadQ();}

/* ================= AI ================= */
function askAI(){
document.getElementById("aiBox").innerHTML=
"Revise this NCERT line carefully 📘";
}

/* ================= FINISH ================= */
function finish(){

new Chart(document.getElementById("chart"),{
type:"bar",
data:{labels:["Score"],datasets:[{data:[score]}]}
});

let rank = score>150?"Top":"Average";

alert("Score: "+score+" Rank: "+rank);
}

</script>
</body>
</html>
