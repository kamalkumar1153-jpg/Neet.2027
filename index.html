<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bitiya Study Vault</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div id="home-screen">
            <header>
                <h1>Bitiya Study Vault 🎓</h1>
                <div id="streak-badge" class="badge">🔥 Streak: 0</div>
            </header>
            <div id="countdown" class="countdown-box">Timer Load Ho Raha Hai...</div>
            <div class="menu-grid">
                <button class="menu-btn" onclick="startQuiz('Physics')">⚛️ Physics</button>
                <button class="menu-btn" onclick="startQuiz('Chemistry')">🧪 Chemistry</button>
                <button class="menu-btn" onclick="startQuiz('Biology')">🧬 Biology</button>
                <button class="menu-btn" onclick="startQuiz('All')">📝 Full Test</button>
                <button class="menu-btn mistake-btn" onclick="startMistakeMode()">❌ Galtiyan Sudharein</button>
            </div>
        </div>

        <div id="quiz-screen" style="display:none;">
            <div class="status-bar">
                <span id="subject-label" class="subject-tag">Subject</span>
                <div id="timer-box">⏱️ <span id="timer">30</span>s</div>
            </div>
            <div class="progress-container"><div class="progress-bar" id="myBar"></div></div>
            <div id="quiz-box">
                <h2 id="questionText">Sawal Load Ho Rahe Hain...</h2>
                <div id="optionsContainer" class="options-grid"></div>
            </div>
        </div>

        <div id="result-screen" style="display:none;">
            <h2 id="final-score-text">Score: 0</h2>
            <button class="retry-btn" onclick="location.reload()">Home Par Wapas Jayein</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="script.js"></script>
</body>
</html>
