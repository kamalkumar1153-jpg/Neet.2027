<!DOCTYPE html>
<html>
<head>
  <title>NEET PRO AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

  <style>
    body { font-family: Arial; background:#0f172a; color:white; padding:10px;}
    .card { background:#1e293b; padding:15px; border-radius:12px; margin-top:10px;}
    button { width:100%; padding:10px; margin:5px 0; border:none; border-radius:8px;}
    .option { background:#334155; }
    .correct { background:green !important; }
    .wrong { background:red !important; }
    #nextBtn { background:orange; }
  </style>
</head>

<body>

<h2>🔥 NEET PRO AI (Firebase Live)</h2>

<button onclick="startQuiz()">Start Quiz</button>

<div id="quiz" style="display:none;">
  <h3 id="timer">Time: 30</h3>

  <div class="card">
    <h3 id="question">Loading...</h3>
    <div id="options"></div>
  </div>

  <button id="nextBtn">Next</button>
</div>

<h3 id="result"></h3>

<script>

// 🔥 FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyCQ9CNumMZQNq5ED-5oGbga6SzpZFK9il4",
  authDomain: "neet-2027-9792f.firebaseapp.com",
  databaseURL: "https://neet-2027-9792f-default-rtdb.firebaseio.com",
  projectId: "neet-2027-9792f",
  storageBucket: "neet-2027-9792f.firebasestorage.app",
  messagingSenderId: "946709283656",
  appId: "1:946709283656:web:51a13d83e8f0a546b5697d"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ================= VARIABLES =================
let questions = [];
let index=0, score=0, timer, time=30;
let correctCount=0, wrongCount=0, answers=[];

// ================= LOAD FROM FIREBASE =================
db.ref("rbse_questions").once("value", snap=>{
  let data = snap.val();

  if(!data){
    alert("❌ Firebase me data nahi mila!");
    return;
  }

  questions = Object.values(data);

  console.log("✅ Questions Loaded:", questions);
});

// ================= START =================
function startQuiz(){

  if(questions.length === 0){
    alert("⏳ Wait... Questions load ho rahe hain!");
    return;
  }

  // shuffle
  questions = questions.sort(()=>0.5 - Math.random());

  index=0;
  score=0;
  correctCount=0;
  wrongCount=0;
  answers=[];

  loadQuestion();
}

// ================= TIMER =================
function startTimer(){
  clearInterval(timer);
  time=30;

  timer=setInterval(()=>{
    time--;
    document.getElementById("timer").innerText="Time: "+time;

    if(time <= 0){
      clearInterval(timer);
      nextQuestion();
    }
  },1000);
}

// ================= LOAD QUESTION =================
function loadQuestion(){
  document.getElementById("quiz").style.display="block";

  if(index >= questions.length){
    finishQuiz();
    return;
  }

  let q = questions[index];

  document.getElementById("question").innerText =
    "Q " + (index+1) + ": " + q.q;

  let html="";
  q.options.forEach((opt,i)=>{
    html += `<button class="option" onclick="check(${i},this)">${opt}</button>`;
  });

  document.getElementById("options").innerHTML = html;

  startTimer();
}

// ================= CHECK =================
function check(ans,btn){
  let correct = questions[index].answer;
  let all = document.querySelectorAll(".option");

  all.forEach(b=>b.disabled=true);
  answers[index] = ans;

  if(ans === correct){
    btn.classList.add("correct");
    score += 4;
    correctCount++;
  }else{
    btn.classList.add("wrong");
    all[correct].classList.add("correct");
    score -= 1;
    wrongCount++;
  }

  clearInterval(timer);
}

// ================= NEXT =================
function nextQuestion(){
  if(answers[index] === undefined){
    answers[index] = null;
  }
  index++;
  loadQuestion();
}

document.getElementById("nextBtn").onclick = nextQuestion;

// ================= FINISH =================
function finishQuiz(){
  document.getElementById("quiz").style.display="none";

  let total = correctCount + wrongCount;
  let acc = total ? ((correctCount/total)*100).toFixed(1) : 0;

  document.getElementById("result").innerHTML = `
    🔥 Score: ${score}<br>
    ✅ Correct: ${correctCount}<br>
    ❌ Wrong: ${wrongCount}<br>
    🎯 Accuracy: ${acc}%
  `;
}

</script>

</body>
</html>
