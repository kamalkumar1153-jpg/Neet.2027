<!DOCTYPE html>
<html lang="hi">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEET AI PRO MAX</title>

<style>
body{background:#0f172a;color:white;font-family:sans-serif}
.container{max-width:500px;margin:auto;padding:10px}
.card{background:#1e293b;padding:12px;border-radius:12px;margin-top:10px}
button{
width:100%;padding:10px;margin:5px 0;
border:none;border-radius:10px;
background:#3b82f6;color:white;font-weight:bold
}
.omr-btn{
width:25px;height:25px;margin:2px;
border-radius:50%;background:#475569;color:white;border:none;font-size:10px
}
.answered{background:#22c55e}
.correct{background:#16a34a}
.wrong{background:#dc2626}
</style>

<!-- 🔥 IMPORTANT -->
<script src="questions.js"></script>

</head>

<body>
<div class="container">

<h2>🧠 NEET AI PRO MAX</h2>
<div id="timer">00:00</div>
<div id="score">Score: 0</div>

<div class="card">
<button onclick="startFullMock()">🧪 Full Mock (180Q)</button>
<button onclick="startTest()">🎯 Start Test</button>
</div>

<div id="quiz" class="card"></div>

<button onclick="next()">Next ➡️</button>

<div class="card">
<h3>OMR</h3>
<div id="omr"></div>
</div>

</div>

<script>

// GLOBAL
let pool=[], index=0, score=0, answers=[];

// TIMER
let t=0;
function startTimer(sec){
t=sec;
setInterval(()=>{
let m=Math.floor(t/60);
let s=t%60;
document.getElementById("timer").innerText = m+":"+s;
t--;
},1000);
}

// START TEST
function startTest(){

pool = questions.sort(()=>Math.random()-0.5).slice(0,50);

index=0;
score=0;
answers=new Array(pool.length).fill(undefined);

loadOMR();
loadQ();
startTimer(1800);

}

// FULL MOCK
function startFullMock(){

let bio = questions.filter(q=>q.subject==="Biology").slice(0,90);
let chem = questions.filter(q=>q.subject==="Chemistry").slice(0,45);
let phy = questions.filter(q=>q.subject==="Physics").slice(0,45);

pool = [...bio,...chem,...phy].sort(()=>Math.random()-0.5);

index=0;
score=0;
answers=new Array(pool.length).fill(undefined);

loadOMR();
loadQ();
startTimer(10800);

}

// LOAD QUESTION
function loadQ(){

let q = pool[index];

let html = `<h3>Q${index+1}: ${q.q}</h3>`;

q.options.forEach((opt,i)=>{
html += `<button onclick="ans(${i},this)">${opt}</button>`;
});

document.getElementById("quiz").innerHTML = html;

}

// ANSWER (NEGATIVE MARKING)
function ans(choice,btn){

let prev = answers[index];

// remove previous effect
if(prev !== undefined){
if(prev === pool[index].answer) score -= 4;
else score += 1;
}

// save new
answers[index] = choice;

// apply new
if(choice === pool[index].answer){
score += 4;
btn.classList.add("correct");
}else{
score -= 1;
btn.classList.add("wrong");
}

document.getElementById("score").innerText="Score: "+score;

document.querySelectorAll(".omr-btn")[index].classList.add("answered");

}

// NEXT
function next(){
if(index < pool.length-1){
index++;
loadQ();
}
}

// OMR
function loadOMR(){

let html="";
for(let i=0;i<pool.length;i++){
html += `<button class="omr-btn" onclick="jump(${i})">${i+1}</button>`;
}
document.getElementById("omr").innerHTML = html;

}

function jump(i){
index=i;
loadQ();
}

</script>

</body>
</html>
