<!DOCTYPE html>
<html>
<head>
  <title>NEET Pro Quiz</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      background: linear-gradient(135deg, #667eea, #764ba2);
    }

    .container {
      max-width: 500px;
      margin: auto;
      padding: 15px;
    }

    .header {
      text-align: center;
      color: white;
    }

    .card {
      background: white;
      border-radius: 20px;
      padding: 20px;
      margin-top: 20px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    }

    img {
      width: 100%;
      border-radius: 15px;
      margin: 10px 0;
    }

    button {
      width: 100%;
      padding: 16px;
      margin: 10px 0;
      font-size: 18px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.05);
      box-shadow: 0 0 15px rgba(102,126,234,0.7);
    }

    button:active {
      transform: scale(0.95);
    }

    .correct {
      background: #4CAF50 !important;
      color: white;
      animation: pulse 0.5s;
    }

    .wrong {
      background: #f44336 !important;
      color: white;
      animation: shake 0.4s;
    }

    @keyframes pulse {
      0%{transform:scale(1)}
      50%{transform:scale(1.1)}
      100%{transform:scale(1)}
    }

    @keyframes shake {
      0%{transform:translateX(0)}
      25%{transform:translateX(-5px)}
      50%{transform:translateX(5px)}
      75%{transform:translateX(-5px)}
      100%{transform:translateX(0)}
    }

    .next-btn {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      font-weight: bold;
    }

    .progress-bar {
      height: 10px;
      background: #ddd;
      border-radius: 10px;
      overflow: hidden;
    }

    .progress {
      height: 100%;
      width: 0%;
      background: #4CAF50;
      transition: 0.4s;
    }
  </style>
</head>

<body>

<div class="container">

  <div class="header">
    <h2>📚 NEET Diagram Quiz</h2>
    <h3 id="progressText"></h3>
    <h3 id="timer">Time: 15</h3>
    <h3 id="score">Score: 0</h3>
  </div>

  <div class="progress-bar">
    <div class="progress" id="progressBar"></div>
  </div>

  <div id="quiz" class="card"></div>

  <button class="next-btn" onclick="nextQ()">Next ➡️</button>

</div>

<script src="questions.js"></script>

<script>
let index = 0;
let score = 0;
let time = 15;
let timer;
let answered = false;

function loadQ(){
  clearInterval(timer);
  time = 15;
  answered = false;

  let q = questions[index];

  document.getElementById("progressText").innerText =
    `Question ${index+1} / ${questions.length}`;

  document.getElementById("timer").innerText = "Time: " + time;

  let percent = (index / questions.length) * 100;
  document.getElementById("progressBar").style.width = percent + "%";

  document.getElementById("quiz").innerHTML = `
    <h3>${q.q}</h3>

    ${q.img ? `
      <img src="${q.img}" 
      onerror="this.src='https://via.placeholder.com/400x250?text=Image+Not+Found'">
    ` : ""}

    ${q.options.map((opt,i)=>
      `<button onclick="checkAns(${i}, this)">${opt}</button>`
    ).join("")}
  `;

  timer = setInterval(()=>{
    time--;
    document.getElementById("timer").innerText = "Time: " + time;
    if(time==0) nextQ();
  },1000);
}

function checkAns(selected,btn){
  if(answered) return;
  answered = true;

  let correct = questions[index].answer;
  let buttons = document.querySelectorAll("#quiz button");

  buttons.forEach((b,i)=>{
    if(i==correct){
      b.classList.add("correct");
    } else {
      b.classList.add("wrong");
    }
    b.disabled = true;
  });

  if(selected==correct) score++;

  document.getElementById("score").innerText="Score: "+score;
}

function nextQ(){
  index++;
  if(index<questions.length){
    loadQ();
  } else {
    document.body.innerHTML=`
      <h2 style="text-align:center;color:white;">🎉 Quiz Finished</h2>
      <h2 style="text-align:center;color:white;">Score: ${score}/${questions.length}</h2>
      <button onclick="location.reload()">Restart</button>
    `;
  }
}

loadQ();
</script>

</body>
</html>
