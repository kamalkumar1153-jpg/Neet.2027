<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RBSE Study Vault - P/C/B</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <header id="timer-box">
            <h3 id="target-title">RBSE Board Exam 2027</h3>
            <div id="countdown">Loading...</div>
        </header>

        <nav class="filter-section">
            <button class="filter-btn active" onclick="filterQuestions('All', this)">All</button>
            <button class="filter-btn" onclick="filterQuestions('Physics', this)">Physics</button>
            <button class="filter-btn" onclick="filterQuestions('Chemistry', this)">Chemistry</button>
            <button class="filter-btn" onclick="filterQuestions('Biology', this)">Biology</button>
        </nav>

        <main id="quiz-card">
            <div class="quiz-header">
                <span id="subject-label">Loading Subject...</span>
                <span id="q-counter">Q: 0 / 0</span>
            </div>
            
            <div class="question-container">
                <h2 id="question-text">Firebase se sawal load ho rahe hain...</h2>
            </div>

            <div id="options-container">
                </div>

            <footer class="controls">
                <button id="prev-btn" class="nav-btn">← Peeche</button>
                <button id="next-btn" class="nav-btn">Aage →</button>
            </footer>
        </main>

        <div id="progress-status">
            Connected to Firebase Realtime Database
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
