<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEET 2027 Study Vault</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <header>
            <h1>NEET 2027 Prep</h1>
            <div id="countdown">Loading Days...</div>
        </header>

        <div class="filter-section">
            <button class="filter-btn active" onclick="filterQuestions('All', this)">All</button>
            <button class="filter-btn" onclick="filterQuestions('Physics', this)">Physics</button>
            <button class="filter-btn" onclick="filterQuestions('Chemistry', this)">Chemistry</button>
            <button class="filter-btn" onclick="filterQuestions('Biology', this)">Biology</button>
        </div>

        <div class="question-card">
            <div id="subject-label" class="subject-tag">All Subjects</div>
            <div id="q-counter">Q: 0 / 0</div>
            
            <h2 id="questionText">Sawal load ho rahe hain...</h2>
            
            <div id="optionsContainer" class="options-grid">
                </div>
        </div>

        <div class="nav-controls">
            <button id="prev-btn" disabled>Previous</button>
            <button id="next-btn">Next</button>
        </div>

        <div class="ai-section">
            <button onclick="askAI()" class="ai-btn">✨ Explain with AI</button>
            <div id="ai-result" class="ai-box" style="display: none;"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
