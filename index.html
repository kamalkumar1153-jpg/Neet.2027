<!DOCTYPE html>
<html>
<head>
  <title>NEET Quiz</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #333;
    }

    .container {
      max-width: 500px;
      margin: auto;
      padding: 15px;
    }

    .header {
      text-align: center;
      color: white;
      margin-top: 20px;
    }

    .card {
      background: white;
      border-radius: 20px;
      padding: 20px;
      margin-top: 20px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    }

    .progress-bar {
      height: 10px;
      background: #ddd;
      border-radius: 10px;
      overflow: hidden;
      margin: 10px 0;
    }

    .progress {
      height: 100%;
      width: 0%;
      background: #4CAF50;
      transition: 0.3s;
    }

    button {
      display: block;
      width: 100%;
      padding: 16px;
      margin: 10px 0;
      font-size: 18px;
      border-radius: 12px;
      border: none;
      background: #f1f1f1;
      cursor: pointer;
    }

    .next-btn {
      background: #667eea;
      color: white;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="container">

  <div class="header">
    <h2>📚 NEET Quiz</h2>
    <h3 id="progressText"></h3>
    <h3 id="timer">Time: 15</h3>
    <h3 id="score">Score: 0</h3>
  </div>

  <div class="progress-bar">
    <div class="progress" id="progressBar"></div>
  </div>

  <div id="quiz" class="card"></div>

  <button class="next-btn" onclick="nextQ()">Next ➡️</button>

</div>

<script>
let questions = [
  {q:"SI unit of force?",options:["Newton","Joule","Pascal","Watt"],answer:0},
  {q:"Heart chambers?",options:["2","3","4","5"],answer:2}
];

let index = 0;
let score = 0;
let time = 15;
let timer;
let answered = false;

function loadQ() {
  clearInterval(timer);
  time = 15;
  answered = false;

  document.getElementById("progressText").innerText =
    `Question ${index+1} / ${questions.length}`;

  document.getElementById("timer").innerText = "Time: " + time;

  let percent = (index / questions.length) * 100;
  document.getElementById("progressBar").style.width = percent + "%";

  let q = questions[index];
  document.getElementById("quiz").innerHTML = `
    <h3>${q.q}</h3>
    ${q.options.map((opt,i)=>
      `<button onclick="checkAns(${i}, this)">${opt}</button>`
    ).join("")}
  `;

  timer = setInterval(()=>{
    time--;
    document.getElementById("timer").innerText = "Time: " + time;
    if(time==0) nextQ();
  },1000);
}

function checkAns(selected,btn){
  if(answered) return;
  answered = true;

  let correct = questions[index].answer;
  let buttons = document.querySelectorAll("#quiz button");

  buttons.forEach((b,i)=>{
    if(i==correct){
      b.style.background="#4CAF50";
      b.style.color="white";
    } else {
      b.style.background="#f44336";
      b.style.color="white";
    }
    b.disabled=true;
  });

  if(selected==correct){
    score++;
  }

  document.getElementById("score").innerText="Score: "+score;
}

function nextQ(){
  index++;
  if(index<questions.length){
    loadQ();
  } else {
    document.body.innerHTML=`
      <h2>🎉 Quiz Finished</h2>
      <h3>Score: ${score}/${questions.length}</h3>
      <button onclick="location.reload()">Restart</button>
    `;
  }
}

loadQ();
</script>

</body>
</html>
