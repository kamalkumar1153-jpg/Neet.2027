<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEET AI SUPER PRO - Study Vault</title>
    <script src="questions.js"></script>
    <style>
        :root {
            --physics: #3b82f6; --chemistry: #ff8a65; --biology: #4caf50;
            --bg: #f3f4f6; --accent: #6366f1; --success: #10b981; --error: #ef4444; --dark: #1e293b;
        }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: #333; user-select: none; }
        
        /* Dashboard */
        .top-strip { background: var(--dark); color: #fbbf24; text-align: center; padding: 12px; font-size: 13px; font-weight: bold; }
        .header { background: white; padding: 35px 20px; text-align: center; border-radius: 0 0 40px 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .subject-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; padding: 20px; }
        .sub-card { border-radius: 24px; padding: 25px 10px; text-align: center; color: white; box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        .start-btn { margin: 25px 20px; background: linear-gradient(135deg, #6366f1, #a855f7); color: white; padding: 22px; border-radius: 25px; text-align: center; font-weight: bold; font-size: 20px; cursor: pointer; box-shadow: 0 12px 25px rgba(99, 102, 241, 0.4); border: none; width: calc(100% - 40px); }

        /* Quiz Screen */
        #quiz-screen, #result-screen { display: none; padding: 15px; background: #0b0f1a; min-height: 100vh; color: #e2e8f0; }
        .q-card { background: #161e31; padding: 20px; border-radius: 25px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.05); }
        .opt { width: 100%; padding: 16px; margin: 10px 0; border: 2px solid #2d3748; border-radius: 15px; background: #1e293b; color: white; text-align: left; font-size: 16px; transition: 0.2s; }
        .opt.selected { border-color: var(--accent); background: rgba(99, 102, 241, 0.2); }
        
        /* OMR Grid */
        .omr-grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 6px; max-height: 180px; overflow-y: auto; padding: 10px; background: #161e31; border-radius: 15px; }
        .dot { aspect-ratio: 1; border-radius: 50%; border: 1px solid #334155; font-size: 9px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .dot.filled { background: var(--accent); color: white; border: none; }
        .dot.active { border: 2px solid white; scale: 1.1; }

        /* Results */
        .score-circle { width: 140px; height: 140px; border-radius: 50%; border: 8px solid var(--accent); display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 20px auto; background: #1e293b; }
    </style>
</head>
<body>

    <div id="dashboard">
        <div class="top-strip" id="countdown">TARGET: APRIL 15, 2027</div>
        <div class="header">
            <h1>Study Vault Pro 🎓</h1>
            <p>120+ Questions Loaded from JS</p>
        </div>
        <div class="subject-grid">
            <div class="sub-card" style="background: var(--physics);"><h3>Physics</h3><p>Active</p></div>
            <div class="sub-card" style="background: var(--chemistry);"><h3>Chemistry</h3><p>Active</p></div>
            <div class="sub-card" style="background: var(--biology);"><h3>Biology</h3><p>Active</p></div>
        </div>
        <button class="start-btn" onclick="startQuiz()">🚀 START FULL TEST</button>
    </div>

    <div id="quiz-screen">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <div id="timer" style="color:#fbbf24; font-weight:bold; font-size:1.4rem;">03:00:00</div>
            <button onclick="showResult()" style="background:var(--error); color:white; border:none; padding:8px 18px; border-radius:10px;">FINISH</button>
        </div>

        <div class="q-card">
            <div id="q-info" style="color:var(--accent); font-weight:bold; font-size:12px; margin-bottom:10px;"></div>
            <p id="q-text" style="font-size:1.1rem; line-height:1.4;"></p>
            <div id="options-box"></div>
        </div>

        <div style="display:flex; gap:10px;">
            <button onclick="nav(-1)" style="flex:1; padding:18px; border-radius:15px; background:#334155; color:white; border:none;">PREV</button>
            <button onclick="nav(1)" style="flex:1; padding:18px; border-radius:15px; background:var(--accent); color:white; border:none;">NEXT</button>
        </div>

        <div class="omr-grid" id="omr-grid" style="margin-top:15px;"></div>
    </div>

    <div id="result-screen" style="text-align:center;">
        <h2>Exam Report</h2>
        <div class="score-circle">
            <span id="final-score" style="font-size: 2.5rem; font-weight:bold;">0</span>
            <small>Score</small>
        </div>
        <div id="stats" class="q-card" style="text-align:left;"></div>
        <button onclick="location.reload()" style="width:100%; padding:20px; border-radius:15px; background:var(--success); color:white; border:none;">RETRY TEST</button>
    </div>

<script>
    // Agar questions.js load nahi hui toh empty array handle karein
    let rawData = typeof masterDB !== 'undefined' ? masterDB : [];
    let testQs = [];
    
    // Logic: 180 questions poore karna (Data ko repeat karke)
    if(rawData.length > 0) {
        for(let i=0; i<180; i++) {
            testQs.push({...rawData[i % rawData.length], id: i+1});
        }
    }

    let userAnswers = new Array(180).fill(null);
    let currentIdx = 0;
    let timeLeft = 10800;
    let timer;

    function startQuiz() {
        if(testQs.length === 0) return alert("Error: questions.js load nahi hui!");
        document.getElementById('dashboard').style.display = 'none';
        document.getElementById('quiz-screen').style.display = 'block';
        renderOMR();
        loadQ();
        timer = setInterval(updateTimer, 1000);
    }

    function loadQ() {
        let q = testQs[currentIdx];
        document.getElementById('q-info').innerText = `${q.s} | QUESTION ${currentIdx + 1}/180`;
        document.getElementById('q-text').innerText = q.q;
        
        let html = "";
        q.o.forEach((opt, i) => {
            let active = userAnswers[currentIdx] === i ? 'selected' : '';
            html += `<button class="opt ${active}" onclick="pick(${i})">${opt}</button>`;
        });
        document.getElementById('options-box').innerHTML = html;
        updateOMR();
    }

    function pick(i) { userAnswers[currentIdx] = i; loadQ(); }
    function nav(dir) { let n = currentIdx + dir; if(n >=0 && n < 180) { currentIdx = n; loadQ(); } }

    function renderOMR() {
        let h = "";
        for(let i=0; i<180; i++) h += `<div class="dot" id="dot-${i}" onclick="currentIdx=${i};loadQ();">${i+1}</div>`;
        document.getElementById('omr-grid').innerHTML = h;
    }

    function updateOMR() {
        document.querySelectorAll('.dot').forEach((d, i) => {
            d.className = "dot";
            if(i === currentIdx) d.classList.add('active');
            if(userAnswers[i] !== null) d.classList.add('filled');
        });
    }

    function updateTimer() {
        timeLeft--;
        let h = Math.floor(timeLeft/3600), m = Math.floor((timeLeft%3600)/60), s = timeLeft%60;
        document.getElementById('timer').innerText = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
        if(timeLeft <= 0) showResult();
    }

    function showResult() {
        clearInterval(timer);
        let score = 0, correct = 0, wrong = 0;
        userAnswers.forEach((ans, i) => {
            if(ans !== null) {
                if(ans === testQs[i].a) { score += 4; correct++; }
                else { score -= 1; wrong++; }
            }
        });
        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        document.getElementById('final-score').innerText = score;
        document.getElementById('stats').innerHTML = `<p>✅ Correct: ${correct}</p><p>❌ Wrong: ${wrong}</p><p>⚪ Skipped: ${180-(correct+wrong)}</p>`;
    }

    // Countdown target
    const target = new Date("April 15, 2027").getTime();
    const days = Math.floor((target - new Date().getTime()) / (1000*60*60*24));
    document.getElementById('countdown').innerText = `TARGET: APRIL 15, 2027 | ${days} DAYS TO GO 🎯`;
</script>
</body>
</html>
