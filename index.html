<!DOCTYPE html>
<html>
<head>
  <title>NEET Quiz Pro Max</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body { font-family: Arial; text-align:center; padding:20px; }
    .card { border:1px solid #ccc; padding:20px; border-radius:10px; margin-top:20px; }
    button { display:block; width:100%; padding:10px; margin:5px 0; }
  </style>
</head>
<body>

<h2>📚 NEET Quiz</h2>
<h3 id="progress"></h3>
<h3 id="timer">Time: 15</h3>

<div id="quiz" class="card"></div>
<button onclick="nextQ()">Next ➡️</button>

<!-- 👇 Important -->
<script src="questions.js"></script>

<script>
let index = 0;
let score = 0;
let time = 15;
let timer;

function loadQ() {
  clearInterval(timer);
  time = 15;

  document.getElementById("progress").innerText =
    `Question ${index+1} / ${questions.length}`;

  document.getElementById("timer").innerText = "Time: " + time;

  let q = questions[index];
  document.getElementById("quiz").innerHTML = `
    <h3>${q.q}</h3>
    ${q.options.map((opt, i) =>
      `<button onclick="checkAns(${i})">${opt}</button>`
    ).join("")}
  `;

  timer = setInterval(() => {
    time--;
    document.getElementById("timer").innerText = "Time: " + time;
    if(time == 0) nextQ();
  }, 1000);
}

function checkAns(selected) {
  if(selected == questions[index].answer) {
    score++;
  }
}

function nextQ() {
  index++;
  if(index < questions.length) {
    loadQ();
  } else {
    showResult();
  }
}

function showResult() {
  clearInterval(timer);
  document.body.innerHTML = `
    <h2>🎉 Quiz Finished</h2>
    <h3>Score: ${score}/${questions.length}</h3>
    <button onclick="location.reload()">Restart</button>
  `;
}

loadQ();
</script>

</body>
</html>
