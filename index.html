<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEET AI Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  font-family:sans-serif;
  margin:0;
  background:#0f172a;
  color:white;
}

.container{max-width:500px;margin:auto;padding:15px;}

.card{
  background:#1e293b;
  padding:15px;
  border-radius:15px;
  margin-top:15px;
}

button{
  width:100%;
  padding:14px;
  margin:6px 0;
  border:none;
  border-radius:10px;
  background:#3b82f6;
  color:white;
  font-size:15px;
}

button:hover{
  background:#2563eb;
}

.subjects button{
  width:30%;
  display:inline-block;
  background:#475569;
}

.correct{background:#16a34a;}
.wrong{background:#dc2626;}

.bar{height:6px;background:#334155;border-radius:10px;margin:10px 0;}
.progress{height:100%;width:0%;background:#22c55e;}

iframe{border-radius:10px;}
</style>
</head>

<body>

<div class="container">

<h2>🎓 NEET AI Dashboard</h2>

<!-- 🎥 VIDEO -->
<div class="card">
<h3>📺 Featured Video</h3>

<iframe width="100%" height="200"
src="https://www.youtube.com/embed/5b9hF9q6TjY"
allowfullscreen></iframe>

</div>

<!-- 📘 SUBJECT -->
<div class="card">
<h3>📚 Select Subject</h3>
<div class="subjects">
<button onclick="setSubject('Biology')">🧬 Bio</button>
<button onclick="setSubject('Chemistry')">⚗️ Chem</button>
<button onclick="setSubject('Physics')">⚡ Phy</button>
</div>
</div>

<!-- 🚀 START -->
<div class="card">
<button onclick="startTest()">🚀 Start Test</button>
</div>

<!-- 🧠 QUIZ -->
<div id="quizBox" class="card" style="display:none;"></div>

<div class="bar"><div id="progress" class="progress"></div></div>

<button onclick="nextQ()">Next ➡️</button>

<!-- 🤖 AI -->
<div class="card">
<h3>🤖 AI Teacher</h3>
<button onclick="askAI()">Explain Answer</button>
<div id="aiBox"></div>
</div>

<!-- 📊 GRAPH -->
<div class="card">
<h3>📊 Weak Topics</h3>
<canvas id="chart"></canvas>
</div>

</div>

<script src="questions.js"></script>

<script>
let subject="Biology";
let index=0,score=0;
let currentQ;
let weak={};

// 🎯 SUBJECT
function setSubject(s){
  subject=s;
  alert("Selected: "+s);
}

// 🚀 START
function startTest(){
  index=0;
  score=0;
  weak={};
  document.getElementById("quizBox").style.display="block";
  loadQ();
}

// 📥 LOAD QUESTION
function loadQ(){
  let filtered = questions.filter(q=>q.topic===subject);

  currentQ = filtered[Math.floor(Math.random()*filtered.length)];

  let html = `<h3>${currentQ.q}</h3>`;

  if(currentQ.img){
    html += `<img src="${currentQ.img}" width="100%">`;
  }

  currentQ.options.forEach((opt,i)=>{
    html+=`<button onclick="checkAns(${i},this)">${opt}</button>`;
  });

  document.getElementById("quizBox").innerHTML = html;

  document.getElementById("progress").style.width=(index/20*100)+"%";
}

// ✅ ANSWER (NEET)
function checkAns(ans,btn){
  let buttons=document.querySelectorAll("#quizBox button");
  buttons.forEach(b=>b.disabled=true);

  if(ans===currentQ.answer){
    btn.classList.add("correct");
    score+=4;
  }else{
    btn.classList.add("wrong");
    score-=1;
    weak[currentQ.topic]=(weak[currentQ.topic]||0)+1;
  }
}

// ➡️ NEXT
function nextQ(){
  index++;
  if(index<20){
    loadQ();
  }else{
    finish();
  }
}

// 🤖 AI
function askAI(){
  let ans=currentQ.options[currentQ.answer];

  document.getElementById("aiBox").innerHTML = `
  <div class="card">
  ✅ Answer: ${ans}<br><br>
  📖 Concept: NCERT revise karo<br>
  🔁 Practice more questions
  </div>`;
}

// 📊 GRAPH
function showGraph(){
  let ctx=document.getElementById("chart");

  new Chart(ctx,{
    type:"bar",
    data:{
      labels:Object.keys(weak),
      datasets:[{
        label:"Weak Topics",
        data:Object.values(weak)
      }]
    }
  });
}

// 🏁 FINISH
function finish(){

  showGraph();

  let rank;

  if(score>=70) rank="🔥 Topper";
  else if(score>=50) rank="👍 Good";
  else rank="❌ Weak";

  alert("Score: "+score+"\nRank: "+rank);
}

</script>

</body>
</html>
