<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Study Vault Pro - 170 Qs</title>
    <style>
        :root { --physics: #3b82f6; --chemistry: #ff8a65; --biology: #4caf50; --bg: #0f172a; --card: #1e293b; --accent: #6366f1; --success: #10b981; --error: #ef4444; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: #f1f5f9; user-select: none; overflow-x: hidden; }
        
        /* Screens */
        #home-screen, #quiz-screen, #result-screen { padding: 20px; transition: 0.3s; }
        #quiz-screen, #result-screen { display: none; }

        /* UI Elements */
        .header { background: linear-gradient(135deg, #1e293b, #0f172a); padding: 30px 20px; border-radius: 0 0 30px 30px; text-align: center; box-shadow: 0 5px 20px rgba(0,0,0,0.4); }
        .mode-card { background: var(--card); padding: 18px; margin: 12px 0; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .q-card { background: var(--card); padding: 20px; border-radius: 20px; margin-top: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        
        /* Diagram Support */
        #q-img { width: 100%; max-height: 220px; object-fit: contain; display: none; margin-bottom: 15px; background: white; border-radius: 12px; padding: 5px; }

        .opt { width: 100%; padding: 16px; margin: 10px 0; border: 2px solid #334155; border-radius: 12px; background: #0f172a; color: white; text-align: left; font-size: 15px; cursor: pointer; outline: none; }
        .opt:active { background: var(--accent); border-color: var(--accent); }
        
        .p-container { width: 100%; height: 6px; background: #334155; border-radius: 10px; margin: 15px 0; }
        #progress-bar { width: 0%; height: 100%; background: var(--accent); border-radius: 10px; transition: 0.3s; }
        
        .start-btn { width: 100%; padding: 18px; border-radius: 15px; background: var(--accent); color: white; border: none; font-weight: bold; font-size: 17px; margin-top: 15px; }
        .mistake-card { background: #161e31; padding: 15px; border-radius: 12px; margin-top: 10px; border-left: 4px solid var(--error); text-align: left; }
    </style>
</head>
<body>

    <div id="home-screen">
        <div class="header">
            <h1 style="margin:0; color: #fbbf24;">Study Vault Pro 🎓</h1>
            <p style="opacity: 0.8; font-size: 14px;">RBSE & NEET Practice (170 Questions)</p>
        </div>
        <div style="margin-top: 25px;">
            <div class="mode-card" style="border-left: 5px solid var(--physics);" onclick="start('Physics')"><span>Physics</span><small>50 Qs</small></div>
            <div class="mode-card" style="border-left: 5px solid var(--chemistry);" onclick="start('Chemistry')"><span>Chemistry</span><small>50 Qs</small></div>
            <div class="mode-card" style="border-left: 5px solid var(--biology);" onclick="start('Biology')"><span>Biology</span><small>50 Qs</small></div>
            <div class="mode-card" style="border: 1px solid var(--accent); background: #2d3748;" onclick="start('Diagram')"><span>📸 Diagram Special</span><small>20 Qs</small></div>
            
            <button class="start-btn" onclick="start('All')" style="background: linear-gradient(135deg, #6366f1, #a855f7);">🚀 START FULL MOCK TEST (170 Qs)</button>
        </div>
    </div>

    <div id="quiz-screen">
        <div style="display:flex; justify-content: space-between; color: #fbbf24; font-weight: bold; font-size: 14px;">
            <span id="sub-tag">SUBJECT</span>
            <span id="live-score">0.00</span>
        </div>
        <div class="p-container"><div id="progress-bar"></div></div>
        <div style="text-align: right; opacity: 0.6; font-size: 12px; margin-bottom: 5px;" id="counter">0/0</div>

        <div class="q-card">
            <img id="q-img" src="" alt="Diagram Loading...">
            <p id="question" style="font-size: 1.1rem; line-height: 1.4; font-weight: 500;"></p>
            <div id="options-box"></div>
        </div>
    </div>

    <div id="result-screen" style="text-align: center;">
        <h2 style="color: #fbbf24;">Test Finished!</h2>
        <div style="font-size: 3.5rem; font-weight: bold; color: var(--success);" id="final-score">0</div>
        <div id="review-box" style="margin-top: 20px; max-height: 350px; overflow-y: auto; padding: 5px;"></div>
        <button class="start-btn" onclick="location.reload()">🏠 RESTART</button>
    </div>

<script>
const bank = [
    // PHYSICS TEXT (50) - (Same as before, abbreviated here for space)
    {s:"Physics", q:"Electric field inside a hollow spherical conductor is?", o:["Zero","Constant","Infinite","Variable"], a:"Zero"},
    {s:"Physics", q:"The working of a transformer is based on?", o:["Self Induction","Mutual Induction","Eddy Currents","None"], a:"Mutual Induction"},
    // ... [Add all other 148 text questions here] ...

    // DIAGRAM QUESTIONS (20)
    {s:"Diagram", q:"Identify the logic gate shown in the diagram:", o:["AND","OR","NAND","NOR"], a:"AND", img:"https://upload.wikimedia.org/wikipedia/commons/6/64/AND_ANSI.svg"},
    {s:"Diagram", q:"Identify the part marked 'X' in the AC Generator:", o:["Armature","Slip Rings","Brushes","Magnet"], a:"Slip Rings", img:"https://placehold.co/400x200?text=Slip+Rings+Diagram"},
    {s:"Diagram", q:"Which type of unit cell is shown in the crystal structure?", o:["Simple Cubic","BCC","FCC","ECC"], a:"BCC", img:"https://placehold.co/400x200?text=BCC+Unit+Cell"},
    {s:"Diagram", q:"Identify the highlighted part of the human heart:", o:["Aorta","Left Ventricle","Vena Cava","Mitral Valve"], a:"Aorta", img:"https://placehold.co/400x200?text=Aorta+Diagram"}
    // ... [Add remaining diagram questions from previous list] ...
];

let testSet = [], idx = 0, score = 0, userAnswers = [];

function start(mode) {
    if(mode === 'All') {
        testSet = [...bank];
    } else {
        testSet = bank.filter(x => x.s === mode);
    }
    
    testSet.sort(() => 0.5 - Math.random()); // Shuffle
    document.getElementById('home-screen').style.display = 'none';
    document.getElementById('quiz-screen').style.display = 'block';
    idx = 0; score = 0; userAnswers = [];
    showQ();
}

function showQ() {
    if(idx >= testSet.length) {
        showFinal();
        return;
    }
    const q = testSet[idx];
    const imgTag = document.getElementById('q-img');

    // Handle Image
    if(q.img) {
        imgTag.src = q.img;
        imgTag.style.display = "block";
    } else {
        imgTag.style.display = "none";
    }

    document.getElementById('sub-tag').innerText = q.s.toUpperCase();
    document.getElementById('counter').innerText = (idx + 1) + " / " + testSet.length;
    document.getElementById('question').innerText = q.q;
    document.getElementById('live-score').innerText = score.toFixed(2);
    document.getElementById('progress-bar').style.width = ((idx / testSet.length) * 100) + "%";
    
    const box = document.getElementById('options-box');
    box.innerHTML = "";
    
    q.o.forEach(opt => {
        const b = document.createElement('button');
        b.className = "opt";
        b.innerText = opt;
        b.onclick = () => {
            const ok = (opt === q.a);
            userAnswers.push({ q: q.q, sel: opt, ans: q.a, ok: ok });
            if(ok) score++;
            idx++; 
            showQ();
        };
        box.appendChild(b);
    });
}

function showFinal() {
    document.getElementById('quiz-screen').style.display = 'none';
    document.getElementById('result-screen').style.display = 'block';
    document.getElementById('final-score').innerText = score;
    
    let html = "<h4>Review Mistakes:</h4>";
    userAnswers.filter(a => !a.ok).forEach(m => {
        html += `<div class="mistake-card"><b>Q:</b> ${m.q}<br>
                 <span style="color:var(--error); text-decoration:line-through;">${m.sel}</span> | 
                 <span style="color:var(--success)">✅ ${m.ans}</span></div>`;
    });
    document.getElementById('review-box').innerHTML = (userAnswers.every(a=>a.ok)) ? "🔥 Perfect Score!" : html;
}
</script>
</body>
</html>
